function renderRetos() {
  const j = STATE.currentUser;
  const isAdmin = STATE.isAdmin;

  // Separar retos por estado
  const activos    = DATA.retos.filter(r => r.estado === 'ACTIVO' || r.estado === 'PENDIENTE');
  const esperando  = DATA.retos.filter(r => r.estado === 'ESPERANDO');
  const completados = DATA.retos.filter(r => r.estado === 'COMPLETADO' || r.estado === 'RECHAZADO' || r.estado === 'GANADO_RETADOR' || r.estado === 'GANADO_RETADO');

  function badgeColor(estado) {
    if (estado === 'ACTIVO' || estado === 'ESPERANDO') return 'pending';
    if (estado === 'COMPLETADO' || estado === 'GANADO_RETADOR' || estado === 'GANADO_RETADO') return 'win';
    if (estado === 'RECHAZADO') return 'lose';
    return 'pending';
  }

  function retoCard(r) {
    const esRetador = r.retador === j;
    const esRetado  = r.retado  === j;
    const implicado = esRetador || esRetado;
    const estadoBadge = '<span class="badge-' + badgeColor(r.estado) + '" style="font-size:11px">' + r.estado + '</span>';

    let acciones = '';

    // Retado puede aceptar/rechazar/contraofertar si está ESPERANDO
    if (r.estado === 'ESPERANDO' && esRetado && !isAdmin) {
      acciones = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">'
        + '<button class="btn-small" style="background:rgba(0,255,136,.15);border-color:rgba(0,255,136,.4);color:var(--green)" onclick="aceptarReto(' + r.id + ')">✅ Aceptar</button>'
        + '<button class="btn-danger" style="font-size:12px" onclick="rechazarReto(' + r.id + ')">❌ Rechazar</button>'
        + '<button class="btn-small" onclick="contraofertarReto(' + r.id + ')">💬 Contraofertar</button>'
        + '</div>';
    }

    // Admin puede resolver retos aceptados (ACTIVO)
    if (r.estado === 'ACTIVO' && isAdmin) {
      acciones = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">'
        + '<button class="btn-small" style="background:rgba(0,255,136,.15);border-color:rgba(0,255,136,.4);color:var(--green)" onclick="resolverReto(' + r.id + ',\'' + r.retador + '\',' + r.penalizacion + ')">🏆 Gana ' + r.retador + '</button>'
        + '<button class="btn-danger" style="font-size:12px" onclick="resolverReto(' + r.id + ',\'' + r.retado + '\',' + r.penalizacion + ')">💀 Gana ' + r.retado + '</button>'
        + '</div>';
    }

    // Retador puede cancelar si sigue ESPERANDO
    if (r.estado === 'ESPERANDO' && esRetador && !isAdmin) {
      acciones = '<div style="margin-top:10px"><button class="btn-danger" style="font-size:12px" onclick="cancelarReto(' + r.id + ')">🗑 Cancelar reto</button></div>';
    }

    const highlight = implicado ? 'border-color:rgba(255,215,0,.3);' : '';
    return '<div style="background:var(--dark3);border:1px solid rgba(255,255,255,.07);' + highlight + 'border-radius:12px;padding:16px;margin-bottom:10px">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">'
      + '<div style="flex:1;min-width:0">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">'
      + '<span style="font-weight:700;font-size:15px">' + r.retador + '</span>'
      + '<span style="color:var(--muted);font-size:13px">reta a</span>'
      + '<span style="font-weight:700;font-size:15px">' + r.retado + '</span>'
      + estadoBadge
      + '</div>'
      + '<div style="color:var(--text);font-size:14px;margin-bottom:6px;line-height:1.4">"' + r.descripcion + '"</div>'
      + '<div style="display:flex;gap:12px;flex-wrap:wrap">'
      + '<span style="color:var(--gold);font-family:Bebas Neue,sans-serif;font-size:18px">💰 ' + r.penalizacion + '€</span>'
      + '<span style="color:var(--muted);font-size:12px;align-self:center">' + (r.fecha || '') + '</span>'
      + (r.notas ? '<span style="color:var(--muted);font-size:12px;font-style:italic;align-self:center">' + r.notas + '</span>' : '')
      + '</div>'
      + '</div>'
      + '</div>'
      + acciones
      + '</div>';
  }

  const retosActivosHTML = activos.length > 0
    ? activos.map(retoCard).join('')
    : '<div style="text-align:center;color:var(--muted);padding:20px">No hay retos activos</div>';

  const retosEsperandoHTML = esperando.length > 0
    ? '<div style="margin-top:16px"><div style="font-size:12px;color:var(--muted);letter-spacing:2px;margin-bottom:10px">⏳ ESPERANDO RESPUESTA</div>' + esperando.map(retoCard).join('') + '</div>'
    : '';

  const historialHTML = completados.length > 0
    ? '<div style="margin-top:8px"><div class="card"><div class="card-title">📋 Historial de Retos</div>' + completados.slice().reverse().slice(0,20).map(retoCard).join('') + '</div></div>'
    : '';

  // Jugadores disponibles para retar (todos menos uno mismo)
  const optsRetador = DATA.jugadores.map(jj => '<option value="' + jj + '"' + (jj===j?' selected':'') + '>' + jj + '</option>').join('');
  const optsRetado  = DATA.jugadores.map(jj => '<option value="' + jj + '">' + jj + '</option>').join('');

  return '<div class="section-title">⚔️ Retos</div>'

    // Formulario nuevo reto
    + '<div class="admin-panel">'
    + '<div class="admin-title">⚔️ Proponer un Reto</div>'
    + '<div style="color:var(--muted);font-size:13px;margin-bottom:16px">Reta a alguien a hacer algo. El otro puede aceptar, rechazar o negociar el importe. El admin decide quién gana.</div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">Yo (retador)</label>'
    + '<select class="form-select" id="reto-de">' + optsRetador + '</select></div>'
    + '<div class="form-group"><label class="form-label">Reto a</label>'
    + '<select class="form-select" id="reto-a">' + optsRetado + '</select></div>'
    + '</div>'
    + '<div class="form-group"><label class="form-label">📝 ¿A qué le retas? (sé creativo)</label>'
    + '<input type="text" class="form-input" id="reto-desc" placeholder="Ej: Te reto a que gritas algo raro en el grupo, Te reto a que llevas el peor look del año..."></div>'
    + '<div class="form-group"><label class="form-label">💰 Importe en juego (€) — el retado puede negociar</label>'
    + '<input type="number" class="form-input" id="reto-pen" placeholder="500" min="1"></div>'
    + '<div class="form-group"><label class="form-label">📅 ¿Cuándo se resuelve? (opcional)</label>'
    + '<input type="text" class="form-input" id="reto-plazo" placeholder="Ej: Esta semana, Antes del viernes..."></div>'
    + '<button class="btn-primary" onclick="crearReto()">⚔️ ENVIAR RETO</button>'
    + '</div>'

    // Retos activos
    + '<div class="card">'
    + '<div class="card-title">⚡ Retos en Curso</div>'
    + retosActivosHTML
    + retosEsperandoHTML
    + '</div>'

    + historialHTML;
}

async function crearReto() {
  const de   = document.getElementById('reto-de').value;
  const a    = document.getElementById('reto-a').value;
  const desc = document.getElementById('reto-desc').value.trim();
  const pen  = parseFloat(document.getElementById('reto-pen').value);
  const plazo = document.getElementById('reto-plazo')?.value.trim() || '';
  if (de === a) { showToast('⚠ No puedes retarte a ti mismo', 'error'); return; }
  if (!desc)    { showToast('⚠ Describe el reto', 'error'); return; }
  if (!pen || pen <= 0) { showToast('⚠ Pon un importe válido', 'error'); return; }
  const r = {
    retador: de, retado: a, descripcion: desc,
    penalizacion: pen, estado: 'ESPERANDO',
    fecha: new Date().toISOString().split('T')[0],
    notas: plazo ? 'Plazo: ' + plazo : ''
  };
  try {
    const newId = await saveReto(r);
    r.id = newId;
    DATA.retos.push(r);
    addNotif(a, 'reto', '⚔️ ' + de + ' te ha retado: "' + desc + '" — ' + pen + '€ en juego');
    showToast('✅ Reto enviado a ' + a, 'success');
    showPage('retos');
  } catch(e) { showToast('❌ Error: ' + e.message, 'error'); }
}

async function aceptarReto(id) {
  const r = DATA.retos.find(r => r.id === id);
  if (!r) return;
  try {
    await updateReto(id, { estado: 'ACTIVO' });
    r.estado = 'ACTIVO';
    addNotif(r.retador, 'reto', '✅ ' + r.retado + ' aceptó tu reto: "' + r.descripcion + '"');
    showToast('✅ Reto aceptado', 'success');
    showPage('retos');
  } catch(e) { showToast('❌ Error: ' + e.message, 'error'); }
}

async function rechazarReto(id) {
  const r = DATA.retos.find(r => r.id === id);
  if (!r) return;
  if (!confirm('¿Seguro que rechazas el reto de ' + r.retador + '?')) return;
  try {
    await updateReto(id, { estado: 'RECHAZADO' });
    r.estado = 'RECHAZADO';
    addNotif(r.retador, 'reto', '❌ ' + r.retado + ' rechazó tu reto: "' + r.descripcion + '"');
    showToast('Reto rechazado', 'success');
    showPage('retos');
  } catch(e) { showToast('❌ Error: ' + e.message, 'error'); }
}

async function cancelarReto(id) {
  const r = DATA.retos.find(r => r.id === id);
  if (!r) return;
  if (!confirm('¿Cancelar el reto?')) return;
  try {
    await updateReto(id, { estado: 'RECHAZADO', notas: 'Cancelado por el retador' });
    r.estado = 'RECHAZADO';
    r.notas = 'Cancelado por el retador';
    showToast('Reto cancelado', 'success');
    showPage('retos');
  } catch(e) { showToast('❌ Error: ' + e.message, 'error'); }
}

function contraofertarReto(id) {
  const r = DATA.retos.find(r => r.id === id);
  if (!r) return;
  const nuevo = prompt('Propón un nuevo importe (€):', r.penalizacion);
  if (!nuevo) return;
  const val = parseFloat(nuevo);
  if (isNaN(val) || val <= 0) { showToast('⚠ Importe inválido', 'error'); return; }
  updateReto(id, { penalizacion: val, notas: 'Contraoferta de ' + STATE.currentUser + ': ' + val + '€' })
    .then(() => {
      r.penalizacion = val;
      r.notas = 'Contraoferta de ' + STATE.currentUser + ': ' + val + '€';
      addNotif(r.retador, 'reto', '💬 ' + r.retado + ' contraoferta tu reto "' + r.descripcion + '" a ' + val + '€');
      showToast('💬 Contraoferta enviada: ' + val + '€', 'success');
      showPage('retos');
    }).catch(e => showToast('❌ Error: ' + e.message, 'error'));
}

async function resolverReto(id, ganador, penalizacion) {
  const r = DATA.retos.find(r => r.id === id);
  if (!r) return;
  const perdedor = ganador === r.retador ? r.retado : r.retador;
  if (!confirm('¿Confirmar? ' + ganador + ' GANA · ' + perdedor + ' paga ' + penalizacion + '€')) return;
  try {
    const nuevoEstado = ganador === r.retador ? 'GANADO_RETADOR' : 'GANADO_RETADO';
    await updateReto(id, { estado: nuevoEstado });
    r.estado = nuevoEstado;
    const kakaObj = { fecha: new Date().toISOString().split('T')[0], jugador: perdedor, kaka: '⚔️ Reto perdido: "' + r.descripcion + '"', multa: penalizacion, notas: 'Reto ganado por ' + ganador };
    const newKakaId = await saveKaka(kakaObj);
    kakaObj.id = newKakaId;
    DATA.kakas.push(kakaObj);
    recalcBancas();
    addNotif(perdedor, 'reto', '💀 Perdiste el reto "' + r.descripcion + '" — multa: -' + penalizacion + '€');
    addNotif(ganador,  'reto', '🏆 Ganaste el reto "' + r.descripcion + '" — ' + perdedor + ' paga ' + penalizacion + '€');
    showToast('✅ Reto resuelto. ' + perdedor + ' paga ' + penalizacion + '€', 'success');
    showPage('retos');
  } catch(e) { showToast('❌ Error: ' + e.message, 'error'); }
}

// ── Immunity helpers ──────────────────────────────────────────
// Inventario en Supabase config — sincronizado entre dispositivos
// DATA.inventarios es el cache en memoria cargado al inicio
function getInventario(jugador) {
  if (!DATA.inventarios) DATA.inventarios = {};
  // Fallback a localStorage por si no se ha cargado aún
  return DATA.inventarios[jugador] || DB._get('liga_inv_' + jugador) || { inmunidades: [], kakas_encargo: [] };
}
function saveInventario(jugador, inv) {
  if (!DATA.inventarios) DATA.inventarios = {};
  DATA.inventarios[jugador] = inv;
  // Guardar en Supabase config Y localStorage como backup
  DB.setConfig('inv_' + jugador, JSON.stringify(inv)).catch(() => {});
  DB._set('liga_inv_' + jugador, inv);
}
async function _loadInventarios() {
  DATA.inventarios = {};
  for (const j of DATA.jugadores) {
    try {
      const raw = await DB.getConfig('inv_' + j);
      if (raw) {
        DATA.inventarios[j] = JSON.parse(raw);
      } else {
        // Migrar desde localStorage si existe
        const local = DB._get('liga_inv_' + j);
        DATA.inventarios[j] = local || { inmunidades: [], kakas_encargo: [] };
        if (local) await DB.setConfig('inv_' + j, JSON.stringify(local));
      }
    } catch(e) {
      DATA.inventarios[j] = DB._get('liga_inv_' + j) || { inmunidades: [], kakas_encargo: [] };
    }
  }
}
function getInmunidadActiva(jugador) {
  const inv = getInventario(jugador);
  const now = Date.now();
  return (inv.inmunidades || []).find(i => i.activa && i.expira > now) || null;
}
function diasRestantes(expira) {
  return Math.max(0, Math.ceil((expira - Date.now()) / (1000 * 60 * 60 * 24)));
}

// Tickets jackpot en Supabase config — sincronizan entre dispositivos
function getTicketsJackpot(jugador) {
  // Versión síncrona: lee del cache DATA.tickets que se carga al inicio
  return ((DATA.tickets || {})[jugador] || []).filter(t => !t.usado).length;
}
function getTodosTickets() {
  const pool = [];
  DATA.jugadores.forEach(j => {
    ((DATA.tickets || {})[j] || []).filter(t => !t.usado).forEach(t => pool.push({ jugador: j, id: t.id }));
  });
  return pool;
}
function marcarTicketsUsados(jugador) {
  if (!DATA.tickets) DATA.tickets = {};
  (DATA.tickets[jugador] || []).forEach(t => t.usado = true);
  DB.setConfig('tickets_' + jugador, JSON.stringify(DATA.tickets[jugador] || [])).catch(()=>{});
}
async function _loadTickets() {
  DATA.tickets = {};
  for (const j of DATA.jugadores) {
    try {
      const raw = await DB.getConfig('tickets_' + j);
      DATA.tickets[j] = raw ? JSON.parse(raw) : [];
    } catch(e) { DATA.tickets[j] = []; }
  }
}
async function _addTicket(jugador) {
  if (!DATA.tickets) DATA.tickets = {};
  DATA.tickets[jugador] = DATA.tickets[jugador] || [];
  DATA.tickets[jugador].push({ id: Date.now(), comprada: Date.now(), usado: false });
  await DB.setConfig('tickets_' + jugador, JSON.stringify(DATA.tickets[jugador]));
  return DATA.tickets[jugador].filter(t => !t.usado).length;
}

async function activarInmunidad(inmId) {
  const j = STATE.currentUser;
  if (getInmunidadActiva(j)) { showToast('⚠ Ya tienes una inmunidad activa', 'error'); return; }
  const inv = getInventario(j);
  const inm = inv.inmunidades.find(i => i.id === inmId);
  if (!inm) return;
  inm.activa = true;
  inm.expira = Date.now() + 7 * 24 * 60 * 60 * 1000;
  saveInventario(j, inv);
  showToast('🛡️ ¡Inmunidad activada! 7 días sin kakas desde ahora.', 'success');
  showPage('tienda');
}

async function comprarItem(codigo) {
  const item = CATALOGO_TIENDA.find(i => i.codigo === codigo);
  const j = STATE.currentUser;
  if (STATE.isAdmin) { showToast('⚠ El admin no puede comprar', 'error'); return; }
  if (!item || DATA.bancas[j] < item.precio) { showToast('⚠ Banca insuficiente', 'error'); return; }
  if (codigo === 'T01' && getInmunidadActiva(j)) { showToast('⚠ Ya tienes inmunidad activa', 'error'); return; }
  if (!confirm(`¿Comprar "${item.nombre}" por ${item.precio.toLocaleString()}€?`)) return;

  const bet = {
    fecha: new Date().toISOString().split('T')[0], jugador: j,
    evento: `[TIENDA] ${item.nombre}`, apuesta: item.precio, cuota: 1,
    resultado: 'LOSE', ganancia: -item.precio, hacienda: 0, jackpot_contrib: 0,
    cuota_propuesta: null, estado_admin: 'aprobada'
  };
  try {
    const newId = await saveApuesta(bet);
    bet.id = newId; DATA.apuestas.push(bet);
    recalcBancas();
    if (codigo === 'T01') {
      const inv = getInventario(j);
      inv.inmunidades = inv.inmunidades || [];
      inv.inmunidades.push({ id: Date.now(), activa: false, comprada: Date.now(), expira: 0 });
      saveInventario(j, inv);
      showToast('🛡️ Inmunidad comprada — actívala en tu inventario cuando quieras.', 'success');
      showPage('tienda');
    } else if (codigo === 'T02') {
      const inv = getInventario(j);
      inv.kakas_encargo = inv.kakas_encargo || [];
      inv.kakas_encargo.push({ id: Date.now(), comprada: Date.now(), usada: false });
      await DB.setConfig('inv_' + j, JSON.stringify(inv));
      DB._set('liga_inv_' + j, inv);
      if (DATA.inventarios) DATA.inventarios[j] = inv;
      showToast('💀 Kaka por Encargo comprada — úsala en "💀 Kaka Encargo"', 'success');
      showPage('kaka-encargo');
    } else if (codigo === 'T03') {
      const total = await _addTicket(j);
      showToast(`🎟️ Ticket comprado — tienes ${total} ticket${total!==1?'s':''} en el sorteo`, 'success');
      showPage('jackpot');
    } else {
      showToast(`✅ ¡${item.nombre} comprado!`, 'success');
      showPage('tienda');
    }
  } catch(e) { showToast('❌ Error al comprar', 'error'); }
}

let _encargoGirando = false;

function girarEncargoRuleta() {
  if (_encargoGirando) return;
  const j = STATE.currentUser;
  const inv = getInventario(j);
  const kakasDisponibles = (inv.kakas_encargo || []).filter(k => !k.usada);
  if (kakasDisponibles.length === 0) { showToast('⚠ No tienes Kakas por Encargo. Cómprala en la Tienda.', 'error'); return; }

  const v1 = document.getElementById('enc-v1')?.value;
  const v2 = document.getElementById('enc-v2')?.value;
  const desc = document.getElementById('enc-desc')?.value.trim();
  const multa = parseFloat(document.getElementById('enc-multa')?.value);

  if (!v1 || !v2) { showToast('⚠ Elige los dos candidatos', 'error'); return; }
  if (v1 === v2) { showToast('⚠ Los candidatos deben ser distintos', 'error'); return; }
  if (!desc) { showToast('⚠ Escribe la descripción de la kaka', 'error'); return; }
  if (!multa || isNaN(multa) || multa < 100) { showToast('⚠ La multa mínima es 100€', 'error'); return; }

  // Lógica oculta: probabilidad de perder configurable por jugador desde el panel secreto
  function calcPerdedor(a, b) {
    const biasA = ENCARGO_BIAS[a] ?? 0.5;
    const biasB = ENCARGO_BIAS[b] ?? 0.5;
    const total = biasA + biasB;
    const pA = total > 0 ? biasA / total : 0.5;
    return Math.random() < pA ? a : b;
  }
  const perdedor = calcPerdedor(v1, v2);

  _encargoGirando = true;
  const btnG = document.getElementById('btn-encargo-girar');
  if (btnG) btnG.disabled = true;

  const preview = document.getElementById('enc-preview');
  const c1 = ENCARGO_COLORS[v1] || '#888';
  const c2 = ENCARGO_COLORS[v2] || '#888';

  preview.innerHTML = `
    <div id="enc-spin-box" style="background:rgba(0,0,0,.3);border:2px solid rgba(255,51,85,.4);border-radius:16px;padding:24px;text-align:center">
      <div style="font-size:12px;color:var(--muted);letter-spacing:3px;margin-bottom:16px">🎡 GIRANDO...</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:16px">
        <div id="enc-c1" style="width:64px;height:64px;border-radius:50%;background:${c1};display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:24px;color:#000;transition:all .12s">${v1[0]}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--muted)">VS</div>
        <div id="enc-c2" style="width:64px;height:64px;border-radius:50%;background:${c2};display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:24px;color:#000;transition:all .12s">${v2[0]}</div>
      </div>
      <div id="enc-spin-label" style="font-family:'Bebas Neue',sans-serif;font-size:52px;min-height:62px;letter-spacing:2px">?</div>
    </div>`;

  let frame = 0;
  const totalFrames = 36;

  function tick() {
    frame++;
    const showing = frame % 2 === 0 ? v1 : v2;
    const isV1 = showing === v1;
    const el1 = document.getElementById('enc-c1');
    const el2 = document.getElementById('enc-c2');
    const lbl = document.getElementById('enc-spin-label');
    if (!lbl) return;
    if (el1) { el1.style.transform = isV1 ? 'scale(1.25)' : 'scale(0.85)'; el1.style.opacity = isV1 ? '1' : '0.35'; }
    if (el2) { el2.style.transform = !isV1 ? 'scale(1.25)' : 'scale(0.85)'; el2.style.opacity = !isV1 ? '1' : '0.35'; }
    lbl.textContent = showing;
    lbl.style.color = ENCARGO_COLORS[showing] || '#fff';
    const delay = frame < totalFrames - 10 ? 80 : 80 + (frame - (totalFrames - 10)) * 28;
    if (frame < totalFrames) {
      setTimeout(tick, delay);
    } else {
      setTimeout(() => {
        const colorP = ENCARGO_COLORS[perdedor] || '#ff3355';
        const esPV1 = perdedor === v1;
        const el1f = document.getElementById('enc-c1');
        const el2f = document.getElementById('enc-c2');
        const lblf = document.getElementById('enc-spin-label');
        if (el1f) { el1f.style.transform = esPV1 ? 'scale(1.3)' : 'scale(0.75)'; el1f.style.opacity = esPV1 ? '1' : '0.2'; }
        if (el2f) { el2f.style.transform = !esPV1 ? 'scale(1.3)' : 'scale(0.75)'; el2f.style.opacity = !esPV1 ? '1' : '0.2'; }
        if (lblf) { lblf.textContent = perdedor; lblf.style.color = colorP; }
        const safeDesc = desc.split("'").join('&#39;').split('"').join('&quot;');
        const spinBox = document.getElementById('enc-spin-box');
        if (spinBox) spinBox.insertAdjacentHTML('afterend', `
          <div style="margin-top:12px;animation:slideInUp .4s ease both;background:rgba(255,51,85,.12);border:2px solid rgba(255,51,85,.5);border-radius:14px;padding:20px;text-align:center">
            <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">💀 La kaka cae en...</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:58px;color:${colorP};line-height:1;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both">${perdedor}</div>
            <div style="color:var(--muted);font-size:14px;margin-top:8px">Multa: <strong style="color:var(--red)">-${multa}€</strong></div>
            <div style="color:var(--muted);font-size:13px;margin-top:4px;font-style:italic">"${desc}"</div>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
              <button class="btn-primary" style="background:linear-gradient(135deg,#ff3355,#cc1133)"
                onclick="confirmarEncargoKaka('${perdedor}','${safeDesc}',${multa})">💀 CONFIRMAR</button>
              <button onclick="_encargoGirando=false;showPage('kaka-encargo')"
                style="background:none;border:1px solid rgba(255,255,255,.2);color:var(--muted);padding:10px 18px;border-radius:8px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px">✖ Cancelar</button>
            </div>
          </div>`);
      }, 300);
    }
  }
  setTimeout(tick, 80);
}

async function confirmarEncargoKaka(victima, desc, multa) {
  const j = STATE.currentUser;
  const inv = getInventario(j);
  const kakasDisponibles = (inv.kakas_encargo || []).filter(k => !k.usada);
  if (kakasDisponibles.length === 0) { showToast('⚠ No tienes kakas disponibles', 'error'); _encargoGirando = false; return; }
  try {
    const kakaObj = {
      fecha: new Date().toISOString().split('T')[0],
      jugador: victima,
      kaka: '💀 ' + desc,
      multa: Number(multa),
      notas: '💀 Encargo de ' + j
    };
    const newId = await saveKaka(kakaObj);
    kakaObj.id = newId;
    DATA.kakas.push(kakaObj);
    const idx = inv.kakas_encargo.findIndex(k => !k.usada);
    if (idx !== -1) inv.kakas_encargo[idx].usada = true;
    await DB.setConfig('inv_' + j, JSON.stringify(inv));
    DB._set('liga_inv_' + j, inv);
    if (DATA.inventarios) DATA.inventarios[j] = inv;
    recalcBancas();
    _encargoGirando = false;
    addNotif(victima, 'kaka', `💀 ¡Te cayó una kaka de encargo de ${j}! "${desc}" — multa: -${multa}€`);
    showToast('💀 ¡Kaka enviada a ' + victima + '! Que sufra.', 'success');
    showPage('kaka-encargo');
  } catch(e) {
    console.error('confirmarEncargoKaka error:', e);
    showToast('❌ Error al enviar la kaka: ' + e.message, 'error');
    _encargoGirando = false;
  }
}

  const actual = document.getElementById('pw-actual').value;

  const confirmar = document.getElementById('pw-confirmar').value;
  if (actual !== PASSWORDS[j]) { showToast('❌ Contraseña actual incorrecta', 'error'); return; }

async function aprobarApuesta(id) {
  const cuotaEl = document.getElementById('cuota-aprueba-' + id);
  const cuota = parseFloat(cuotaEl ? cuotaEl.value : 1);
  if (!cuota || cuota < 1) { showToast('⚠ Cuota inválida', 'error'); return; }
  try {
    await updateApuestaAdmin(id, { cuota, estado_admin: 'aprobada', resultado: 'PENDIENTE', ganancia: 0 });
    const bet = DATA.apuestas.find(a=>a.id===id);
    bet.cuota = cuota; bet.estado_admin = 'aprobada'; bet.resultado = 'PENDIENTE'; bet.ganancia = 0;
    recalcBancas();
    buildNav();
    addNotif(bet.jugador, 'apuesta', `✅ Tu apuesta fue aprobada con cuota x${cuota}`);
    showToast('✅ Apuesta aprobada con cuota x' + cuota, 'success');
    showPage('admin-apuestas');
  } catch(e) {}
}

async function rechazarApuesta(id) {
  const bet = DATA.apuestas.find(a=>a.id===id);
  if (!confirm('¿Rechazar esta apuesta? El dinero se devolverá al jugador.')) return;
  try {
    await deleteApuestaDB(id);
    DATA.apuestas = DATA.apuestas.filter(a=>a.id!==id);
    recalcBancas();
    buildNav();
    if (bet) addNotif(bet.jugador, 'apuesta', `❌ Tu apuesta fue rechazada por el admin — dinero devuelto`);
    showToast('❌ Apuesta rechazada — dinero devuelto a ' + (bet?bet.jugador:'jugador'), 'success');
    showPage('admin-apuestas');
  } catch(e) {}
}

async function resolvebet(id, res) {
  const bet = DATA.apuestas.find(a=>a.id===id);
  if (!bet) return;
  const fin = calcFinanciero(bet.apuesta, bet.cuota, res);
  try {
    await updateApuestaResultado(id, res, fin.ganancia, fin.hacienda, fin.jackpot_contrib);
    bet.resultado = res; bet.ganancia = fin.ganancia; bet.hacienda = fin.hacienda; bet.jackpot_contrib = fin.jackpot_contrib;
    DATA.jackpotExtra += fin.jackpot_contrib;
    await saveConfig('jackpotExtra', DATA.jackpotExtra);
    recalcBancas();
    addNotif(bet.jugador, 'resultado', `${res==='WIN'?'🏆':'💀'} Tu apuesta "${bet.evento}" fue resuelta: ${res} (${fin.ganancia>=0?'+':''}${fin.ganancia.toFixed(0)}€)`);
    showToast(`✅ ${res}: ganancia ${fin.ganancia>=0?'+':''}-${fin.ganancia.toFixed(0)}€`, 'success');
    showPage('admin-apuestas');
  } catch(e) {}
}

// Cancela una apuesta aprobada PENDIENTE → devuelve el dinero al jugador eliminando la apuesta
async function cancelarApuestaAprobada(id) {
  const bet = DATA.apuestas.find(a=>a.id===id);
  if (!bet) return;
  if (!confirm(`¿Cancelar la apuesta de ${bet.jugador} (${bet.apuesta}€ — ${bet.evento})?\n\nEl dinero será devuelto automáticamente.`)) return;
  try {
    await deleteApuestaDB(id);
    DATA.apuestas = DATA.apuestas.filter(a=>a.id!==id);
    recalcBancas();
    buildNav();
    showToast(`↩ Apuesta cancelada — ${bet.apuesta}€ devueltos a ${bet.jugador}`, 'success');
    showPage('admin-apuestas');
  } catch(e) { showToast('❌ Error al cancelar', 'error'); }
}

// Revierte una apuesta ya resuelta (WIN/LOSE) a estado PENDIENTE para re-resolver
async function revertirResultado(id) {
  const bet = DATA.apuestas.find(a=>a.id===id);
  if (!bet) return;
  if (!confirm(`¿Revertir resultado de "${bet.evento}" (${bet.jugador})?\n\nVolverá a estado PENDIENTE para re-resolver.`)) return;
  const oldResult = bet.resultado;
  // Si era WIN/LOSE había contribución al jackpot → revertir
  const jackpotRevert = bet.jackpot_contrib || 0;
  try {
    await updateApuestaAdmin(id, { resultado: 'PENDIENTE', ganancia: 0, hacienda: 0, jackpot_contrib: 0 });
    bet.resultado = 'PENDIENTE'; bet.ganancia = 0; bet.hacienda = 0; bet.jackpot_contrib = 0;
    DATA.jackpotExtra -= jackpotRevert;
    await saveConfig('jackpotExtra', DATA.jackpotExtra);
    recalcBancas();
    showToast(`↩ Resultado revertido — "${bet.jugador}" vuelve a PENDIENTE`, 'success');
    showPage('admin-apuestas');
  } catch(e) { showToast('❌ Error al revertir', 'error'); }
}

async function adminAddBet() {

  const cantidad = parseFloat(document.getElementById('adm-cantidad').value);
  const cuota = parseFloat(document.getElementById('adm-cuota').value);

  if (!evento||!cantidad||!cuota) { showToast('⚠ Rellena todos los campos', 'error'); return; }

    cuota_propuesta: null, estado_admin: 'aprobada'
  };
  try {
    const newId = await saveApuesta(bet);

    if (resultado) await saveConfig('jackpotExtra', DATA.jackpotExtra);

function updateKakaMulta() {

  const jugador = document.getElementById('kaka-jugador')?.value;
  const warn = document.getElementById('kaka-inmunidad-warn');
  if (warn && jugador) {
    const inm = getInmunidadActiva(jugador);
    warn.style.display = inm ? 'block' : 'none';
    if (inm) warn.textContent = `⚠️ ${jugador} tiene inmunidad activa — le quedan ${diasRestantes(inm.expira)} día(s). El kaka no se podrá aplicar.`;
  }
}

function checkKakaInmunidad() {
  const jugador = document.getElementById('kaka-jugador')?.value;
  const warn = document.getElementById('kaka-inmunidad-warn');
  if (!warn || !jugador) return;
  const inm = getInmunidadActiva(jugador);
  warn.style.display = inm ? 'block' : 'none';
  if (inm) warn.textContent = `⚠️ ${jugador} tiene INMUNIDAD activa — ${diasRestantes(inm.expira)} día(s) restantes. No se puede aplicar kaka.`;
}

async function addKaka() {
  const jugador = document.getElementById('kaka-jugador').value;
  // Check immunity
  const inm = getInmunidadActiva(jugador);
  if (inm) {
    showToast(`🛡️ ${jugador} tiene inmunidad activa — ${diasRestantes(inm.expira)} día(s) restantes. No se puede aplicar kaka.`, 'error');
    return;
  }
  const tipo = document.getElementById('kaka-tipo');
  const kaka = tipo.options[tipo.selectedIndex].text.split(' (')[0];
  const multa = parseFloat(document.getElementById('kaka-multa').value);
  const notas = document.getElementById('kaka-notas').value;
  if (!multa||multa<=0) { showToast('⚠ Multa inválida', 'error'); return; }

  // Check immunity
  const inmunidad = getInmunidadActiva(jugador);
  if (inmunidad) {
    const dias = diasRestantes(inmunidad.expira);
    showToast(`🛡️ ${jugador} tiene inmunidad activa (${dias} día${dias!==1?'s':''} restante${dias!==1?'s':''}) — no se puede aplicar kaka`, 'error');
    return;
  }

  const kakaObj = { fecha: new Date().toISOString().split('T')[0], jugador, kaka, multa, notas };
  try {
    const newId = await saveKaka(kakaObj);
    kakaObj.id = newId; DATA.kakas.push(kakaObj);
    recalcBancas();
    addNotif(jugador, 'kaka', `😈 ¡Te cayó una kaka! ${kaka} — multa: -${multa}€`);
    showToast(`😈 Kaka a ${jugador}: -${multa}€`, 'success');
    showPage('admin-kakas');
  } catch(e) {}
}

async function apostarEnEvento(eventoId, opcion) {
  const j = STATE.currentUser;
  const ev = DATA.eventos.find(e => e.id === eventoId);
  if (!ev || ev.estado !== 'ACTIVO') { showToast('⚠ Evento no disponible', 'error'); return; }
  const inputId = `ev-imp-${eventoId}-${opcion.replace(/\s/g,'_')}`;
  const cantidad = parseFloat(document.getElementById(inputId)?.value);
  if (!cantidad || cantidad <= 0) { showToast('⚠ Introduce una cantidad', 'error'); return; }
  if (cantidad > DATA.bancas[j]) { showToast('⚠ Banca insuficiente', 'error'); return; }
  const yaAposto = (ev.apuestas_pool || []).find(a => a.jugador === j && a.opcion === opcion);
  if (yaAposto) { showToast('⚠ Ya apostaste en esta opción', 'error'); return; }

  // Descontar de banca
  const bet = {
    fecha: new Date().toISOString().split('T')[0], jugador: j,
    evento: `[EVENTO] ${ev.titulo} — ${opcion}`, apuesta: cantidad, cuota: ev.cuota,
    resultado: 'PENDIENTE', ganancia: 0, hacienda: 0, jackpot_contrib: 0,
    cuota_propuesta: null, estado_admin: 'aprobada', evento_pool_id: eventoId
  };
  try {
    const newId = await saveApuesta(bet); bet.id = newId;
    DATA.apuestas.push(bet);
    const pool = ev.apuestas_pool || [];
    pool.push({ jugador: j, opcion, cantidad, bet_id: newId });
    await updateEvento(eventoId, { apuestas_pool: pool });
    recalcBancas();
    showToast(`✅ Apostaste ${cantidad}€ en "${opcion}"`, 'success');
    showPage('eventos');
  } catch(e) { showToast('❌ Error al apostar', 'error'); }
}

async function crearEvento() {
  const titulo = document.getElementById('ev-titulo').value.trim();
  const desc = document.getElementById('ev-desc').value.trim();
  const cuota = parseFloat(document.getElementById('ev-cuota').value);
  const opcionesRaw = document.getElementById('ev-opciones').value;
  const opciones = opcionesRaw.split(',').map(o=>o.trim()).filter(Boolean);
  if (!titulo) { showToast('⚠ Añade un título', 'error'); return; }
  if (isNaN(cuota)||cuota<1) { showToast('⚠ Cuota inválida', 'error'); return; }
  if (opciones.length < 2) { showToast('⚠ Al menos 2 opciones (separadas por coma)', 'error'); return; }
  const ev = { titulo, descripcion: desc, cuota, opciones, apuestas_pool: [], estado: 'ACTIVO', fecha: new Date().toISOString().split('T')[0] };
  try {
    const newId = await saveEvento(ev); ev.id = newId;
    DATA.eventos.push(ev);
    showToast('✅ Evento creado', 'success');
    showPage('admin-eventos');
  } catch(e) { showToast('❌ Error', 'error'); }
}

async function cerrarEvento(eventoId) {
  const ev = DATA.eventos.find(e=>e.id===eventoId);
  if (!ev) return;
  const ganadora = document.getElementById('ganadora-'+eventoId)?.value;
  if (!ganadora) { showToast('⚠ Selecciona la opción ganadora', 'error'); return; }
  if (!confirm(`¿Cerrar evento "${ev.titulo}"? La opción ganadora es: "${ganadora}". Se repartirá el pool entre los ganadores.`)) return;

  // Ganadores = los que apostaron a la opción ganadora
  const ganadores = (ev.apuestas_pool || []).filter(a => a.opcion === ganadora);
  const perdedores = (ev.apuestas_pool || []).filter(a => a.opcion !== ganadora);
  const totalPool = (ev.apuestas_pool || []).reduce((s,a) => s+a.cantidad, 0);

  // Resolver apuestas de ganadores: WIN con cuota fijada
  for (const g of ganadores) {
    const bet = DATA.apuestas.find(b => b.id === g.bet_id);
    if (bet && bet.resultado === 'PENDIENTE') {
      const fin = calcFinanciero(g.cantidad, ev.cuota, 'WIN');
      await updateApuestaResultado(g.bet_id, 'WIN', fin.ganancia, fin.hacienda, fin.jackpot_contrib);
      bet.resultado='WIN'; bet.ganancia=fin.ganancia; bet.hacienda=fin.hacienda; bet.jackpot_contrib=fin.jackpot_contrib;
      DATA.jackpotExtra+=fin.jackpot_contrib;
    }
  }
  // Resolver apuestas de perdedores: LOSE
  for (const p of perdedores) {
    const bet = DATA.apuestas.find(b => b.id === p.bet_id);
    if (bet && bet.resultado === 'PENDIENTE') {
      const fin = calcFinanciero(p.cantidad, ev.cuota, 'LOSE');
      await updateApuestaResultado(p.bet_id, 'LOSE', fin.ganancia, fin.hacienda, fin.jackpot_contrib);
      bet.resultado='LOSE'; bet.ganancia=fin.ganancia; bet.hacienda=fin.hacienda; bet.jackpot_contrib=fin.jackpot_contrib;
      DATA.jackpotExtra+=fin.jackpot_contrib;
    }
  }

  await updateEvento(eventoId, { estado: 'RESUELTO', opcion_ganadora: ganadora });
  await saveConfig('jackpotExtra', DATA.jackpotExtra);
  recalcBancas();
  const nGan = ganadores.length;
  showToast(`🏆 Evento cerrado. ${nGan} ganador(es) en "${ganadora}". Pool: ${totalPool}€`, 'success');
  showPage('admin-eventos');
}

async function cancelarEvento(eventoId) {
  if (!confirm('¿Cancelar evento? Las apuestas pendientes serán devueltas.')) return;
  const ev = DATA.eventos.find(e=>e.id===eventoId);
  if (!ev) return;
  // Devolver apuestas pendientes
  for (const ap of (ev.apuestas_pool||[])) {
    const bet = DATA.apuestas.find(b=>b.id===ap.bet_id);
    if (bet && bet.resultado==='PENDIENTE') {
      await updateApuestaResultado(ap.bet_id, 'AJUSTE+', ap.cantidad, 0, 0);
      bet.resultado='AJUSTE+'; bet.ganancia=ap.cantidad;
    }
  }
  await updateEvento(eventoId, { estado: 'CANCELADO' });
  recalcBancas();
  showToast('✅ Evento cancelado y apuestas devueltas', 'success');
  showPage('admin-eventos');
}

// CHAT — guardado en tabla config de Supabase (no necesita tabla propia)
// ============================================================
const _CHAT_KEY = 'chat_msgs';
let _chatPollInterval = null;

function stopChatPolling() {
  if (_chatPollInterval) { clearInterval(_chatPollInterval); _chatPollInterval = null; }
}

function _chatRenderMsgs(msgs, j) {
  if (!msgs.length) return '<div style="text-align:center;color:var(--muted);padding:40px">Sin mensajes aún... ¡sé el primero! 🎰</div>';
  return msgs.slice(-80).map(m => {
    const mine = m.jugador === j;
    const ts = new Date(m.ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    return `<div class="chat-msg ${mine?'chat-msg-mine':'chat-msg-other'}">
      ${!mine?`<div class="chat-author">${m.jugador}</div>`:''}
      <div>${escapeHtml(m.texto)}</div>
      <div class="chat-time">${ts}</div>
    </div>`;
  }).join('');
}

function getChatNoLeidos(para) {
  const lastRead = +(DB._get('chat_last_' + para) || 0);
  return DATA.chat.filter(m => m.jugador !== para && new Date(m.ts).getTime() > lastRead).length;
}

function startChatPolling() {
  if (_chatPollInterval) return;
  let lastTs = DATA.chat.length ? DATA.chat[DATA.chat.length-1].ts : '';
  _chatPollInterval = setInterval(async () => {
    if (STATE.activePage !== 'chat') { stopChatPolling(); return; }
    try {
      const raw = await DB.getConfig(_CHAT_KEY);
      const fresh = raw ? JSON.parse(raw) : [];
      const newTs = fresh.length ? fresh[fresh.length-1].ts : '';
      if (newTs === lastTs) return;
      DATA.chat = fresh; lastTs = newTs;
      const box = document.getElementById('chatBox');
      if (!box) { stopChatPolling(); return; }
      const j = STATE.isAdmin ? 'ADMIN' : STATE.currentUser;
      const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 80;
      box.innerHTML = _chatRenderMsgs(DATA.chat, j);
      if (atBottom) box.scrollTop = box.scrollHeight;
    } catch(e) {}
  }, 4000);
}

function renderChat() {
  const j = STATE.isAdmin ? 'ADMIN' : STATE.currentUser;
  DB._set('chat_last_' + j, Date.now());
  buildNav();
  startChatPolling();
  return `<div class="section-title">💬 Chat de la Liga</div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="chat-box" id="chatBox">${_chatRenderMsgs(DATA.chat, j)}</div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="Escribe algo..." maxlength="300"
          onkeydown="if(event.key==='Enter')enviarChat()">
        <button id="chatSendBtn" class="btn-primary" style="padding:12px 20px;font-size:15px" onclick="enviarChat()">ENVIAR</button>
      </div>
    </div>`;
}

function scrollChatToBottom() {
  const box = document.getElementById('chatBox');
  if (box) box.scrollTop = box.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function enviarChat() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('chatSendBtn');
  const texto = input?.value?.trim();
  if (!texto) return;
  const j = STATE.isAdmin ? 'ADMIN' : STATE.currentUser;
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  try {
    // Leer estado actual antes de escribir (evita race conditions)
    const raw = await DB.getConfig(_CHAT_KEY);
    DATA.chat = raw ? JSON.parse(raw) : [];
    DATA.chat.push({ jugador: j, texto, ts: new Date().toISOString() });
    if (DATA.chat.length > 100) DATA.chat = DATA.chat.slice(-100);
    await DB.setConfig(_CHAT_KEY, JSON.stringify(DATA.chat));
    if (input) input.value = '';
    DATA.jugadores.filter(jj => jj !== j).forEach(jj => addNotif(jj, 'chat', `💬 ${j}: ${texto.slice(0,40)}`));
    const box = document.getElementById('chatBox');
    if (box) { box.innerHTML = _chatRenderMsgs(DATA.chat, j); box.scrollTop = box.scrollHeight; }
  } catch(e) {
    console.error('Chat error:', e);
    showToast('❌ Error enviando: ' + (e.message||''), 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'ENVIAR'; }
  }
}

async function crearP2P() {
  const j = STATE.currentUser;
  const retado = document.getElementById('p2p-retado').value;
  const cantidad = parseFloat(document.getElementById('p2p-cantidad').value);
  if (!cantidad || cantidad <= 0) { showToast('⚠ Cantidad inválida', 'error'); return; }
  if (cantidad > DATA.bancas[j]) { showToast('⚠ Banca insuficiente', 'error'); return; }
  if (DATA.bancas[retado] < cantidad) { showToast(`⚠ ${retado} no tiene banca suficiente`, 'error'); return; }
  // Empieza en PENDIENTE_ADMIN — el admin aprueba antes de que el retado pueda aceptar
  const p = { retador: j, retado, cantidad, estado: 'PENDIENTE_ADMIN', fecha: new Date().toISOString().split('T')[0], ganador: null };
  try {
    const saved = await DB.insert('p2p', p);
    p.id = saved.id; DATA.p2p.push(p);
    showToast(`✅ Reto enviado al admin para revisión`, 'success');
    buildNav();
    showPage('p2p');
  } catch(e) { showToast('❌ Error creando reto', 'error'); }
}

async function adminRechazarP2P(id) {

async function responderP2P(id, acepta) {
  const p = DATA.p2p.find(x=>x.id===id);
  if (!p) return;
  const j = STATE.currentUser;
  if (!acepta) {
    await DB.update('p2p', id, { estado: 'RECHAZADA' });
    p.estado = 'RECHAZADA';
    addNotif(p.retador, 'p2p', `❌ ${j} rechazó tu reto P2P de ${p.cantidad}€`);
    showToast('Reto rechazado', 'success'); buildNav(); showPage('p2p'); return;
  }
  if (DATA.bancas[j] < p.cantidad) { showToast('⚠ No tienes banca suficiente', 'error'); return; }
  // Ambos aceptan → EN_JUEGO, el admin resuelve el resultado
  await DB.update('p2p', id, { estado: 'EN_JUEGO' });
  p.estado = 'EN_JUEGO';
  addNotif(p.retador, 'p2p', `✅ ${j} aceptó tu reto P2P de ${p.cantidad}€ — ¡está EN JUEGO! El admin resolverá el resultado.`);
  showToast('✅ Reto aceptado — en juego. El admin resolverá el resultado', 'success');
  buildNav(); showPage('p2p');
}

async function resolverP2P(id, ganador) {
  const p = DATA.p2p.find(x=>x.id===id);
  if (!p || p.estado !== 'EN_JUEGO') { showToast('⚠ El reto no está en juego', 'error'); return; }
  if (!confirm(`¿Resolver reto P2P? Ganador: ${ganador}`)) return;
  const bote = p.cantidad * 2;
  if (ganador === 'EMPATE') {
    // Devolver cantidades — no hay movimiento financiero, simplemente cerramos
    await DB.update('p2p', id, { estado: 'RESUELTA', ganador: 'EMPATE' });
    p.estado = 'RESUELTA'; p.ganador = 'EMPATE';
    addNotif(p.retador, 'p2p', `🤝 Reto P2P resuelto: EMPATE — se devuelven los fondos`);
    addNotif(p.retado, 'p2p', `🤝 Reto P2P resuelto: EMPATE — se devuelven los fondos`);
    showToast('🤝 Empate — fondos devueltos', 'success');
  } else {
    const perdedor = ganador === p.retador ? p.retado : p.retador;
    const fin = calcFinanciero(bote, 1, 'WIN');
    // Registrar ganancia del ganador y pérdida del perdedor
    const betGan = { fecha: new Date().toISOString().split('T')[0], jugador: ganador, evento: `[P2P] Reto vs ${perdedor}`, apuesta: p.cantidad, cuota: 2, resultado: 'WIN', ganancia: p.cantidad - fin.hacienda - fin.jackpot_contrib, hacienda: fin.hacienda, jackpot_contrib: fin.jackpot_contrib, cuota_propuesta: null, estado_admin: 'aprobada' };
    const betPerd = { fecha: new Date().toISOString().split('T')[0], jugador: perdedor, evento: `[P2P] Reto vs ${ganador}`, apuesta: p.cantidad, cuota: 2, resultado: 'LOSE', ganancia: -p.cantidad, hacienda: 0, jackpot_contrib: 0, cuota_propuesta: null, estado_admin: 'aprobada' };
    const [sg, sp] = await Promise.all([saveApuesta(betGan), saveApuesta(betPerd)]);
    betGan.id=sg; betPerd.id=sp; DATA.apuestas.push(betGan); DATA.apuestas.push(betPerd);
    DATA.jackpotExtra += fin.jackpot_contrib;
    await saveConfig('jackpotExtra', DATA.jackpotExtra);
    await DB.update('p2p', id, { estado: 'RESUELTA', ganador });
    p.estado = 'RESUELTA'; p.ganador = ganador;
    addNotif(ganador, 'p2p', `🏆 ¡Ganaste el reto P2P vs ${perdedor}! +${(p.cantidad - fin.hacienda - fin.jackpot_contrib).toFixed(0)}€`);
    addNotif(perdedor, 'p2p', `💀 Perdiste el reto P2P vs ${ganador}. -${p.cantidad}€`);
    recalcBancas();
    showToast(`🏆 Resuelto — ${ganador} gana`, 'success');
  }
  buildNav(); showPage('p2p');
}

async function tirarDado() {
  if (dadosState.girando) return;
  const j = STATE.currentUser;
  const importe = parseFloat(document.getElementById('dado-importe').value);
  const tipo = document.getElementById('dado-tipo').value;
  if (!importe || importe <= 0) { showToast('⚠ Introduce un importe', 'error'); return; }
  if (importe > DATA.bancas[j]) { showToast('⚠ Banca insuficiente', 'error'); return; }

  const dadoDisplay = document.getElementById('dado-display');
  const dadoResult = document.getElementById('dado-result');
  dadosState.girando = true;
  const CARAS = ['⚀','⚁','⚂','⚃','⚄','⚅'];
  let frames = 0;
  const roll = setInterval(() => {
    dadoDisplay.textContent = CARAS[Math.floor(Math.random()*6)];
    if (++frames >= 18) {
      clearInterval(roll);
      const num = Math.floor(Math.random()*6)+1;
      dadoDisplay.textContent = CARAS[num-1];
      let gana = false, cuota = 1.9;
      if (tipo==='alto') gana = num>=4;
      else if (tipo==='bajo') gana = num<=3;
      else if (tipo==='par') gana = num%2===0;
      else if (tipo==='impar') gana = num%2!==0;
      else if (tipo==='exacto') { cuota=5.5; gana = num===parseInt(document.getElementById('dado-num').value); }
      // Probabilidad real por tipo de apuesta en dados
      const probDado = tipo==='exacto' ? 1/6 : 3/6; // exacto=1/6, alto/bajo/par/impar=3/6
      gana = playerWinDecision(j, probDado, 'dados');
      if (gana && karmaRigged(j)) gana = false;
      const resultado = gana ? 'WIN' : 'LOSE';
      const effDado = getEffectiveCuota(j, cuota);
      const fin = calcFinanciero(importe, effDado, resultado);
      dadoResult.innerHTML = `<span style="color:${gana?'var(--green)':'var(--red)'};font-family:'Bebas Neue',sans-serif;font-size:28px">${gana?'¡ACIERTO! +'+fin.ganancia.toFixed(0)+'€':'FALLASTE '+fin.ganancia.toFixed(0)+'€'}</span>`;
      registrarApuestaCasino(j, `Dados ${tipo} → ${num}`, importe, effDado, resultado, fin).then(()=>{
        dadosState.girando = false;
      });
    }
  }, 80);
}

async function girarSlots() {
  if (slotsSpinning) return;
  const j = STATE.currentUser;
  const importe = parseFloat(document.getElementById('slot-importe').value);
  if (!importe || importe <= 0) { showToast('⚠ Introduce un importe', 'error'); return; }
  if (importe > DATA.bancas[j]) { showToast('⚠ Banca insuficiente', 'error'); return; }
  slotsSpinning = true;
  const resultEl = document.getElementById('slot-result');
  resultEl.textContent = '';
  const reels = [document.getElementById('reel-0'), document.getElementById('reel-1'), document.getElementById('reel-2')];
  const final = [0,1,2].map(()=>SLOT_SYMBOLS[Math.floor(Math.random()*SLOT_SYMBOLS.length)]);
  let frame = 0;
  const anim = setInterval(()=>{
    reels.forEach(r=>{ r.textContent = SLOT_SYMBOLS[Math.floor(Math.random()*SLOT_SYMBOLS.length)]; });
    if (++frame>=30) {
      clearInterval(anim);
      final.forEach((s,i)=>reels[i].textContent=s);
      let cuota = 0;
      if (final[0]===final[1]&&final[1]===final[2]) cuota = SLOT_PAYOUTS[final[0]];
      else if (final[0]===final[1]||final[1]===final[2]||final[0]===final[2]) cuota = 1.5;
      // Probabilidad real: triple=1/64 aprox, par=3*(7/64) aprox, distinto=muy alto
      // Usamos la probabilidad implícita de la cuota obtenida (1/cuota)
      const probSlot = cuota > 0 ? Math.min(0.9, 1 / cuota) : 0.0;
      let gana = playerWinDecision(j, probSlot, 'slots');
      if (!gana) cuota = 0;
      if (gana && karmaRigged(j)) { gana = false; cuota = 0; }
      const resultado = gana ? 'WIN' : 'LOSE';
      const effSlot = gana ? getEffectiveCuota(j, cuota) : 1;
      const fin = calcFinanciero(importe, effSlot, resultado);
      resultEl.innerHTML = gana
        ? `<span style="color:var(--green);font-family:'Bebas Neue',sans-serif;font-size:26px">🎉 ¡PREMIO x${cuota}! +${fin.ganancia.toFixed(0)}€</span>`
        : `<span style="color:var(--red);font-family:'Bebas Neue',sans-serif;font-size:22px">💸 Sin premio — ${fin.ganancia.toFixed(0)}€</span>`;
      registrarApuestaCasino(j, `Slots [${final.join('')}]`, importe, effSlot, resultado, fin).then(()=>{slotsSpinning=false;});
    }
  }, 60);
}

  { id:'blackjack_nat',   icon:'🂡', nombre:'Blackjack Natural',     desc:'Consigue un blackjack natural',       check: (s,bets)=>bets.some(b=>b.evento&&b.evento.includes('Natural')) },
  { id:'p2p_win',         icon:'⚔️', nombre:'Gladiador',            desc:'Gana un reto P2P',                    check: (s,bets)=>bets.some(b=>b.evento&&b.evento.includes('[P2P]')&&b.resultado==='WIN') },
  { id:'loan_shark',      icon:'🦈', nombre:'Tiburón',               desc:'Presta dinero a otro jugador',        check: (s,bets,j)=>DATA.prestamos.some(p=>p.prestamista===j) },
  { id:'kaka_inmune',     icon:'🛡️', nombre:'Intocable',            desc:'Activa la inmunidad en la tienda',     check: (s,bets,j)=>{ const inv=getInventario(j); return (inv.inmunidades||[]).some(i=>i.activa); } },
  { id:'slots_jackpot',   icon:'🎰', nombre:'Slot Master',           desc:'Saca tres 🎰 en los slots',           check: (s,bets)=>bets.some(b=>b.evento&&b.evento.includes('🎰🎰🎰')) },
];

function calcRachaMax(bets, tipo) {
  let max=0, cur=0;
  for (const b of bets) { if(b.resultado===tipo){cur++;max=Math.max(max,cur);}else cur=0; }
  return max;
}

function renderCalendario() {
  const j = STATE.currentUser;
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const todayStr = now.toISOString().split('T')[0];
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  // Agrupar apuestas pendientes por fecha — jugadores con apuestas (sin mostrar montos ni eventos)
  const pendByDay = {};
  DATA.apuestas.filter(a=>a.resultado==='PENDIENTE'&&a.estado_admin==='aprobada').forEach(a=>{
    if (!a.fecha) return;
    if (!pendByDay[a.fecha]) pendByDay[a.fecha] = { total:0, mine:0, jugadores:new Set() };
    pendByDay[a.fecha].total++;
    pendByDay[a.fecha].jugadores.add(a.jugador);
    if (a.jugador===j) pendByDay[a.fecha].mine++;
  });

  // Avatares de jugadores (primera letra)
  const PLAYER_COLORS = { Leifer:'#4488ff', Nicolas:'#9944ff', 'Raúl':'#ff3355', Pablo:'#00ff88', Mauro:'#FFD700', Manuel:'#ff6622' };

  let cells = '';
  const startOffset = (firstDay + 6) % 7; // Monday first
  for (let i=0; i<startOffset; i++) {
    cells += `<div class="cal-day other-month"><div style="color:var(--muted);font-size:12px">${daysInPrev-startOffset+i+1}</div></div>`;
  }
  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const info = pendByDay[dateStr];
    let content = '';
    if (info && info.jugadores.size > 0) {
      // Mostrar avatares de quién tiene apuesta — sin revelar montos ni eventos
      const avatares = [...info.jugadores].map(jj => {
        const color = PLAYER_COLORS[jj] || '#888';
        const isMine = jj === j;
        return `<span title="${jj}" style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:${color};color:#000;font-size:9px;font-weight:900;border:${isMine?'2px solid #fff':'1px solid rgba(0,0,0,.3)'};">${jj[0]}</span>`;
      }).join('');
      content = `<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px">${avatares}</div>`;
    }
    cells += `<div class="cal-day ${isToday?'today':''} ${info&&info.jugadores.size>0?'has-bets':''}">
      <div style="font-size:12px;font-weight:700">${d}</div>${content}
    </div>`;
  }
  const totalCells = startOffset + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i=1; i<=remaining; i++) cells += `<div class="cal-day other-month"><div style="color:var(--muted);font-size:12px">${i}</div></div>`;

  const dayHeaders = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div class="cal-day-label">${d}</div>`).join('');

  const totalPend = DATA.apuestas.filter(a=>a.resultado==='PENDIENTE'&&a.estado_admin==='aprobada').length;
  const myPend = DATA.apuestas.filter(a=>a.resultado==='PENDIENTE'&&a.estado_admin==='aprobada'&&a.jugador===j).length;

  // Leyenda de jugadores
  const leyenda = DATA.jugadores.map(jj=>{
    const color = PLAYER_COLORS[jj] || '#888';
    const n = DATA.apuestas.filter(a=>a.jugador===jj&&a.resultado==='PENDIENTE'&&a.estado_admin==='aprobada').length;
    return `<div style="display:flex;align-items:center;gap:6px">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:${color};color:#000;font-size:10px;font-weight:900">${jj[0]}</span>
      <span style="font-size:13px">${jj}</span>
      ${n>0?`<span class="cal-badge-dot">${n}</span>`:'<span style="color:var(--muted);font-size:12px">·</span>'}
    </div>`;
  }).join('');

  return `<div class="section-title">📅 Calendario</div>
    <div class="grid-2" style="margin-bottom:16px">
      <div class="card"><div class="card-title">📌 Apuestas Pendientes Totales</div><div class="card-value" style="color:var(--gold2)">${totalPend}</div></div>
      ${!STATE.isAdmin?`<div class="card"><div class="card-title">📌 Mis Apuestas Pendientes</div><div class="card-value" style="color:var(--gold2)">${myPend}</div></div>`:'<div class="card"><div class="card-title">📌 Jugadores con Pendientes</div><div class="card-value" style="color:var(--gold2)">${new Set(DATA.apuestas.filter(a=>a.resultado==="PENDIENTE"&&a.estado_admin==="aprobada").map(a=>a.jugador)).size}</div></div>'}
    </div>
    <div class="card">
      <div class="card-title" style="text-align:center;font-size:18px">📅 ${monthNames[month]} ${year}</div>
      <div style="margin-bottom:8px"><div class="cal-grid">${dayHeaders}</div></div>
      <div class="cal-grid">${cells}</div>
      <div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:12px">${leyenda}</div>
      <div style="margin-top:10px;font-size:11px;color:var(--muted)">Los avatares muestran quién tiene apuestas pendientes ese día. Sin montos ni eventos.</div>
    </div>`;
}

function renderEstadisticas() {
  const j = STATE.currentUser;
  const allBets = DATA.apuestas.filter(a=>a.jugador===j&&(a.resultado==='WIN'||a.resultado==='LOSE'));
  const wins = allBets.filter(a=>a.resultado==='WIN');
  const loses = allBets.filter(a=>a.resultado==='LOSE');

  const totalApostado = allBets.reduce((s,a)=>s+a.apuesta,0);
  const totalGanado = allBets.reduce((s,a)=>s+a.ganancia,0);
  const totalHacienda = allBets.reduce((s,a)=>s+(a.hacienda||0),0);
  const totalJackpot = allBets.reduce((s,a)=>s+(a.jackpot_contrib||0),0);
  const winRate = allBets.length>0?(wins.length/allBets.length*100).toFixed(1):0;
  const roi = ((DATA.bancas[j]-1000)/1000*100).toFixed(1);
  const avgCuota = allBets.length>0?(allBets.reduce((s,a)=>s+a.cuota,0)/allBets.length).toFixed(2):0;
  const avgApuesta = allBets.length>0?(totalApostado/allBets.length).toFixed(0):0;
  const maxWin = wins.length>0?Math.max(...wins.map(a=>a.ganancia)):0;
  const maxLose = loses.length>0?Math.max(...loses.map(a=>Math.abs(a.ganancia))):0;
  const rachaMaxWin = calcRachaMax(allBets, 'WIN');
  const rachaMaxLose = calcRachaMax(allBets, 'LOSE');

  // Evolución de banca (simplificada por las últimas 20 apuestas)
  let bancaEvo = 1000;
  const evoData = allBets.slice(-20).map(a=>{ bancaEvo+=a.ganancia; return bancaEvo; });
  const evoMin = Math.min(800, ...evoData), evoMax = Math.max(1200, ...evoData);
  const evoRange = evoMax - evoMin || 1;
  const svgH = 80, svgW = 300;
  const svgPoints = evoData.map((v,i)=>{
    const x = (i/(Math.max(evoData.length-1,1)))*svgW;
    const y = svgH - ((v-evoMin)/evoRange)*svgH;
    return `${x},${y}`;
  }).join(' ');
  const svgLine = evoData.length>1?`<polyline points="${svgPoints}" fill="none" stroke="${totalGanado>=0?'#00ff88':'#ff3355'}" stroke-width="2.5" stroke-linejoin="round"/>`:'';
  const svgCircles = evoData.map((v,i)=>{
    const x=(i/(Math.max(evoData.length-1,1)))*svgW, y=svgH-((v-evoMin)/evoRange)*svgH;
    return `<circle cx="${x}" cy="${y}" r="3" fill="${v>=1000?'#00ff88':'#ff3355'}"/>`;
  }).join('');

  // Head to head vs cada jugador
  const h2h = DATA.jugadores.filter(jj=>jj!==j).map(opp=>{
    const myWins = DATA.p2p.filter(p=>p.estado==='RESUELTA'&&p.ganador===j&&(p.retador===opp||p.retado===opp)).length;
    const oppWins = DATA.p2p.filter(p=>p.estado==='RESUELTA'&&p.ganador===opp&&(p.retador===j||p.retado===j)).length;
    return { opp, myWins, oppWins };
  }).filter(h=>h.myWins+h.oppWins>0);

  // Tipo de juego preferido
  const byTipo = {};
  allBets.forEach(b=>{
    let tipo = 'Apuesta';
    if(b.evento&&b.evento.includes('Ruleta'))tipo='Ruleta';
    else if(b.evento&&b.evento.includes('Dados'))tipo='Dados';
    else if(b.evento&&b.evento.includes('Slots'))tipo='Slots';
    else if(b.evento&&b.evento.includes('Cara'))tipo='Cara o Cruz';
    else if(b.evento&&b.evento.includes('Blackjack'))tipo='Blackjack';
    else if(b.evento&&b.evento.includes('[P2P]'))tipo='P2P';
    byTipo[tipo]=(byTipo[tipo]||0)+1;
  });
  const tipoRows = Object.entries(byTipo).sort((a,b)=>b[1]-a[1]).map(([t,n])=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <span style="color:var(--muted)">${t}</span>
      <span style="font-weight:700">${n}</span>
      <div style="width:80px"><div class="mini-bar"><div class="mini-bar-fill" style="width:${(n/allBets.length*100).toFixed(0)}%;background:var(--blue)"></div></div></div>
    </div>`).join('');

  // Comparativa contra el resto de la liga
  const ligaStats = DATA.jugadores.filter(jj=>jj!==j).map(jj=>{
    const jSt = getPlayerStats(jj);
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <div style="font-weight:700;min-width:70px">${jj}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted)"><span>Banca</span><span style="color:${DATA.bancas[jj]>=DATA.bancas[j]?'var(--red)':'var(--green)'}">${DATA.bancas[jj].toFixed(0)}€</span></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted)"><span>Win%</span><span>${jSt.winRate}%</span></div>
      </div>
    </div>`;
  }).join('');

  return `<div class="section-title">📈 Estadísticas — ${j}</div>
    <div class="grid-4" style="margin-bottom:16px">
      <div class="card"><div class="card-title">Win Rate</div><div class="card-value positive">${winRate}%</div></div>
      <div class="card"><div class="card-title">ROI</div><div class="card-value ${roi>=0?'positive':'negative'}">${roi}%</div></div>
      <div class="card"><div class="card-title">Cuota Media</div><div class="card-value" style="color:var(--blue)">x${avgCuota}</div></div>
      <div class="card"><div class="card-title">Apuesta Media</div><div class="card-value" style="color:var(--text)">${avgApuesta}€</div></div>
    </div>
    <div class="grid-2" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title">📊 Resumen Financiero</div>
        <div class="mini-stat"><span class="mini-stat-label">Total Apostado</span><span class="mini-stat-value">${totalApostado.toFixed(0)}€</span></div>
        <div class="mini-stat"><span class="mini-stat-label">Total Ganado Neto</span><span class="mini-stat-value ${totalGanado>=0?'profit-pos':'profit-neg'}">${totalGanado>=0?'+':''}${totalGanado.toFixed(0)}€</span></div>
        <div class="mini-stat"><span class="mini-stat-label">💸 Hacienda pagada</span><span class="mini-stat-value profit-neg">${totalHacienda.toFixed(0)}€</span></div>
        <div class="mini-stat"><span class="mini-stat-label">🎰 Jackpot aportado</span><span class="mini-stat-value" style="color:var(--gold)">${totalJackpot.toFixed(0)}€</span></div>
        <div class="mini-stat"><span class="mini-stat-label">Victorias / Derrotas</span><span class="mini-stat-value">${wins.length}W · ${loses.length}L</span></div>
        <div class="mini-stat"><span class="mini-stat-label">💰 Mayor Ganancia</span><span class="mini-stat-value profit-pos">+${maxWin.toFixed(0)}€</span></div>
        <div class="mini-stat"><span class="mini-stat-label">💀 Mayor Pérdida</span><span class="mini-stat-value profit-neg">-${maxLose.toFixed(0)}€</span></div>
      </div>
      <div class="card">
        <div class="card-title">🔥 Rachas Históricas</div>
        <div class="mini-stat"><span class="mini-stat-label">Mejor racha WIN</span><span class="mini-stat-value positive">${rachaMaxWin}🔥</span></div>
        <div class="mini-stat"><span class="mini-stat-label">Peor racha LOSE</span><span class="mini-stat-value negative">${rachaMaxLose}❄️</span></div>
        <div class="card-title" style="margin-top:16px">🎮 Juegos Favoritos</div>
        ${tipoRows||'<div style="color:var(--muted);font-size:13px">Sin datos</div>'}
      </div>
    </div>
    ${evoData.length>1?`<div class="card" style="margin-bottom:16px">
      <div class="card-title">📉 Evolución de Banca (últimas 20 apuestas)</div>
      <svg width="100%" viewBox="0 0 ${svgW} ${svgH}" preserveAspectRatio="none" style="display:block;height:80px">${svgLine}${svgCircles}</svg>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px"><span>${evoMin.toFixed(0)}€</span><span>${evoMax.toFixed(0)}€</span></div>
    </div>`:''}
    <div class="grid-2">
      ${h2h.length>0?`<div class="card"><div class="card-title">⚔️ Head to Head P2P</div>
        ${h2h.map(h=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
          <span style="flex:1;font-weight:700">${h.opp}</span>
          <span class="profit-pos">${h.myWins}W</span><span style="color:var(--muted)">·</span><span class="profit-neg">${h.oppWins}L</span>
        </div>`).join('')}
      </div>`:''}
      <div class="card"><div class="card-title">🏆 Comparativa Liga</div>${ligaStats}</div>
    </div>`;
}

const CONFETTI_COLORS = ['#FFD700','#FFA500','#00ff88','#4488ff','#9944ff','#ff3355','#fff','#ff6622'];

function lanzarConfetti(duracion = 4000) {
  const end = Date.now() + duracion;
  function frame() {
    if (Date.now() > end) return;
    for (let i = 0; i < 6; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-20px';
      el.style.background = CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
      el.style.width = (Math.random()*10+6) + 'px';
      el.style.height = (Math.random()*10+6) + 'px';
      el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      el.style.animationDuration = (Math.random()*2+2) + 's';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

  lanzarConfetti(5000);
}

function cerrarCelebracion() {
  const overlay = document.getElementById('jackpot-overlay');
  if (overlay) overlay.classList.remove('show');
}
