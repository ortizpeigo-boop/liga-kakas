// CANVAS DE RASCAR
// ══════════════════════════════════════════════════════════════
function initScratchCanvas() {
  const canvas = document.getElementById('scratch-canvas');
  if (!canvas) return;
  const S = RASCA_STATE;
  const t = S.tipo;

  // Tamaño real del canvas
  const wrap = canvas.parentElement;
  canvas.width  = wrap.offsetWidth  || 320;
  canvas.height = wrap.offsetHeight || 320;

  const ctx = canvas.getContext('2d');

  // Pintar la capa de rasca con gradiente dorado
  const grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  const stops = t.scratch.match(/#[0-9a-fA-F]{6}/g) || ['#aa7700','#FFD700','#aa7700'];
  stops.forEach((c,i) => grad.addColorStop(i/(stops.length-1||1), c));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Textura con líneas sutiles
  ctx.globalAlpha = 0.08;
  for (let y=0; y<canvas.height; y+=8) {
    ctx.fillStyle = y%16===0?'#fff':'#000';
    ctx.fillRect(0,y,canvas.width,4);
  }
  ctx.globalAlpha = 1;

  // Texto "RASCA" en la capa
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(0,0,0,.2)';
  ctx.font = `bold ${canvas.width*0.08}px Bebas Neue, sans-serif`;
  ctx.textAlign = 'center';
  ctx.letterSpacing = '8px';
  for (let y=60; y<canvas.height-20; y+=80) {
    ctx.fillText('RASCA Y GANA ✦ RASCA Y GANA ✦', canvas.width/2, y);
  }

  // Rascar con mouse/touch
  let isDown = false;
  let lastX, lastY;
  S.scratchPct = 0;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function scratch(x, y) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 28, 0, Math.PI*2);
    ctx.fill();
    if (lastX !== undefined) {
      ctx.lineWidth = 52;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.stroke();
    }
    lastX = x; lastY = y;
    updateScratchProgress(ctx, canvas);
  }

  canvas.addEventListener('mousedown', e=>{ isDown=true; lastX=undefined; lastY=undefined; const p=getPos(e); scratch(p.x,p.y); });
  canvas.addEventListener('mousemove', e=>{ if(!isDown) return; const p=getPos(e); scratch(p.x,p.y); });
  canvas.addEventListener('mouseup', ()=>{ isDown=false; });
  canvas.addEventListener('mouseleave', ()=>{ isDown=false; });
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); isDown=true; lastX=undefined; lastY=undefined; const p=getPos(e); scratch(p.x,p.y); }, {passive:false});
  canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(!isDown) return; const p=getPos(e); scratch(p.x,p.y); }, {passive:false});
  canvas.addEventListener('touchend', ()=>{ isDown=false; });
}

function updateScratchProgress(ctx, canvas) {
  if (RASCA_STATE.completed) return;
  // Muestrear pixels transparentes
  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let transparent = 0;
  for (let i=3; i<imageData.data.length; i+=4) {
    if (imageData.data[i] < 128) transparent++;
  }
  const total = (canvas.width * canvas.height);
  const pct = Math.min(100, (transparent / total) * 100);
  RASCA_STATE.scratchPct = pct;

  const bar = document.getElementById('scratch-progress');
  const pctEl = document.getElementById('scratch-pct');
  if (bar) bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct.toFixed(0) + '%';

  if (pct >= 65 && !RASCA_STATE.completed) {
    completeRasca();
  }
}

function autoRevealRasca() {
  const canvas = document.getElementById('scratch-canvas');
  if (!canvas || RASCA_STATE.completed) return;
  const ctx = canvas.getContext('2d');
  let step = 0;
  const total = 30;
  const interval = setInterval(() => {
    step++;
    ctx.globalCompositeOperation = 'destination-out';
    const cols = 6, rows = 6;
    for (let i=0; i<cols; i++) {
      for (let j=0; j<rows; j++) {
        if (Math.random() < step/total) {
          ctx.beginPath();
          ctx.arc(
            (i+0.5)*(canvas.width/cols),
            (j+0.5)*(canvas.height/rows),
            canvas.width/cols,
            0, Math.PI*2
          );
          ctx.fill();
        }
      }
    }
    updateScratchProgress(ctx, canvas);
    if (step >= total || RASCA_STATE.completed) clearInterval(interval);
  }, 40);
}

// ══════════════════════════════════════════════════════════════
async function completeRasca() {
  if (RASCA_STATE.completed) return;
  RASCA_STATE.completed = true;

  const S = RASCA_STATE;
  const j = STATE.currentUser;
  const t = S.tipo;

  // Ocultar el canvas
  const canvasWrap = document.querySelector('.scratch-canvas-wrap');
  if (canvasWrap) {
    canvasWrap.style.transition = 'opacity .5s';
    canvasWrap.style.opacity = '0';
    setTimeout(()=>{ canvasWrap.style.display='none'; }, 500);
  }

  // Calcular resultado
  const cfg = getRascaCfg(j, t.id);
  let mult = 0;
  if (S.winner) {
    mult = S.winner.mult * (cfg.prize_mult || 1);
  }
  const resultado = mult > 0 ? 'WIN' : 'LOSE';
  const fin = mult > 0 ? calcFinanciero(S.bet, mult, 'WIN') : calcFinanciero(S.bet, 2, 'LOSE');
  S.ganancia = fin.ganancia;

  await registrarApuestaCasino(
    j,
    `Rasca ${t.nombre}: ${S.winner ? S.winner.symbol+' '+S.winner.label+' '+mult+'x' : 'Sin premio'}`,
    S.bet, mult || 2, resultado, fin, mult || 2
  );
  recalcBancas();

  // Revelar resultado con animación
  await new Promise(res => setTimeout(res, 600));

  const area = document.getElementById('rasca-result-area');
  if (!area) return;

  if (mult > 0) {

      </div>
      <div style="font-size:13px;color:${t.colorText}77;margin-bottom:16px">${S.winner.label} · ${mult}x multiplicador</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button onclick="buyRasca('${t.id}')" style="padding:12px;background:linear-gradient(135deg,${t.color2},${t.color1});border:none;border-radius:10px;color:${t.colorText};font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer">🔄 REPETIR</button>

      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--red);letter-spacing:3px;margin:8px 0">SIN PREMIO</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:16px">−${S.bet.toLocaleString('es-ES')}€ · ¡Suerte la próxima!</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button onclick="buyRasca('${t.id}')" style="padding:12px;background:linear-gradient(135deg,${t.color2}44,${t.color1}44);border:1px solid ${t.color2}44;border-radius:10px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer">🔄 REPETIR</button>
        <button onclick="RASCA_STATE.active=false;renderPage('rasca')" style="padding:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer">🎟️ LOBBY</button>
      </div>
    </div>`;
  }

  // Botón de auto-revelar desaparece
  const autoBtn = document.querySelector('[onclick="autoRevealRasca()"]');
  if (autoBtn) autoBtn.style.display = 'none';
}

// CONFETTI ÉPICO
// ══════════════════════════════════════════════════════════════
function launchConfetti(accentColor = '#FFD700') {
  const colors = [accentColor, '#FFD700', '#00ffaa', '#ff44aa', '#4488ff', '#fff'];
  const container = document.createElement('div');
  container.className = 'scratch-confetti';
  document.body.appendChild(container);

  for (let i=0; i<120; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random()*colors.length)];
    piece.style.cssText = `
      left:${Math.random()*100}%;
      background:${color};
      width:${6+Math.random()*10}px;
      height:${8+Math.random()*14}px;
      border-radius:${Math.random()<0.5?'50%':'2px'};
      animation-duration:${2+Math.random()*3}s;
      animation-delay:${Math.random()*1.5}s;
    `;
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 6000);
}

// ══════════════════════════════════════════════════════════════
// ADMIN PANEL — CONFIGURACIÓN DE RASCAS
// ══════════════════════════════════════════════════════════════
function renderRascaAdminPanel() {
  const PCOLOR = {Alex:'#4488ff',Nicolas:'#9944ff','Raúl':'#ff3355',Pablo:'#00ff88',Mauro:'#FFD700',Manuel:'#ff6622'};

  const playerRows = DATA.jugadores.map(jj => {
    const col = PCOLOR[jj] || '#888';
    const k = normKey(jj);
    const jCfg = RASCA_PLAYER_CFG[k] || {};

    return `
    <div class="rasca-admin-row">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#000;flex-shrink:0;box-shadow:0 0 12px ${col}66">${jj[0]}</div>
        <div>
          <div style="font-size:16px;font-weight:700;color:${col}">${jj}</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:2px">CONFIGURACIÓN POR TIPO DE RASCA</div>
        </div>
        <button onclick="saveRascaPlayerCfg('${jj}')" style="margin-left:auto;background:rgba(${col.replace('#','').match(/../g).map(h=>parseInt(h,16)).join(',')}, .2);border:1px solid ${col}55;border-radius:8px;padding:6px 14px;color:${col};cursor:pointer;font-size:12px;letter-spacing:1px">💾 Guardar</button>
      </div>
      <div style="display:grid;gap:8px">
        ${RASCA_TIPOS.map(t => {
          const cfg = jCfg[t.id] || { win_boost:0, prize_mult:1 };
          const wb = Math.round((cfg.win_boost||0)*100);
          const pm = Math.round((cfg.prize_mult||1)*100);
          return `
          <div style="background:rgba(0,0,0,.2);border:1px solid ${t.color2}33;border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:auto 1fr 1fr;gap:10px;align-items:center">
            <div style="font-size:24px">${t.emoji}</div>
            <div>
              <div style="font-size:10px;color:${t.color2}99;letter-spacing:2px;margin-bottom:4px">${t.nombre.toUpperCase()} · ${t.precio}€</div>
              <div>
                <div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:3px">WIN BOOST %</div>
                <input type="number" id="radm-wb-${jj}-${t.id}" value="${wb}" min="-90" max="90" step="5"
                  style="width:100%;background:var(--dark);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:5px 8px;border-radius:6px;font-size:14px;font-family:'Barlow Condensed',sans-serif">
                <div style="font-size:9px;color:var(--muted);margin-top:2px">+ = más victorias</div>
              </div>
            </div>
            <div>
              <div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:3px">MULT PREMIO %</div>
              <input type="number" id="radm-pm-${jj}-${t.id}" value="${pm}" min="10" max="500" step="10"
                style="width:100%;background:var(--dark);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:5px 8px;border-radius:6px;font-size:14px;font-family:'Barlow Condensed',sans-serif">
              <div style="font-size:9px;color:var(--muted);margin-top:2px">100=normal · 200=doble</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // Tabla de probabilidades reales
  const probTable = RASCA_TIPOS.map(t => {
    const totalWinProb = t.prizes.filter(p=>p.mult>0).reduce((s,p)=>s+p.prob,0);
    const expReturn = t.prizes.filter(p=>p.mult>0).reduce((s,p)=>s+(p.prob/100)*p.mult,0);
    return `
    <tr style="border-bottom:1px solid rgba(255,255,255,.04)">
      <td style="padding:8px;font-size:13px">${t.emoji} ${t.nombre}</td>
      <td style="padding:8px;text-align:center;color:var(--gold)">${t.precio}€</td>
      <td style="padding:8px;text-align:center;color:var(--green)">${totalWinProb.toFixed(1)}%</td>
      <td style="padding:8px;text-align:center;color:${expReturn>=1?'var(--green)':'var(--red)'}">${(expReturn*100).toFixed(0)}%</td>
      <td style="padding:8px;text-align:center">${t.maxPremio}</td>
    </tr>`;
  }).join('');

  return `
  <div style="background:rgba(255,215,0,.06);border:2px solid rgba(255,215,0,.2);border-radius:18px;padding:22px;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
      <div style="font-size:28px">🎟️</div>
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold)">CONTROL DE RASCAS</div>
        <div style="color:var(--muted);font-size:11px;letter-spacing:2px">Configura probabilidades y premios por jugador</div>
      </div>
    </div>

    <!-- Tabla de probabilidades reales -->
    <div style="background:rgba(0,0,0,.3);border-radius:12px;overflow:hidden;margin-bottom:20px">
      <div style="padding:10px 14px;background:rgba(255,215,0,.08);font-size:11px;color:var(--gold);letter-spacing:2px;font-weight:700">📊 PROBABILIDADES BASE (sin modificar)</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="border-bottom:2px solid rgba(255,215,0,.2)">
            <th style="padding:8px;text-align:left;color:var(--muted);letter-spacing:1px">TIPO</th>
            <th style="padding:8px;text-align:center;color:var(--muted);letter-spacing:1px">PRECIO</th>
            <th style="padding:8px;text-align:center;color:var(--muted);letter-spacing:1px">WIN %</th>
            <th style="padding:8px;text-align:center;color:var(--muted);letter-spacing:1px">RETORNO</th>
            <th style="padding:8px;text-align:center;color:var(--muted);letter-spacing:1px">MÁX</th>
          </tr>
        </thead>
        <tbody>${probTable}</tbody>
      </table>
    </div>

    <!-- Config por jugador -->
    <div style="font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:12px;font-weight:700">⚙️ CONFIGURACIÓN POR JUGADOR</div>
    <div style="background:rgba(255,165,0,.06);border:1px solid rgba(255,165,0,.2);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:rgba(255,165,0,.8);line-height:1.6">
      ⚠️ <strong>WIN BOOST</strong>: +20 = 20% más probabilidad de ganar · −20 = 20% menos. Se suma a la probabilidad base.<br>
      ⚠️ <strong>MULT PREMIO</strong>: 200 = dobla cualquier premio que gane. 50 = reduce el premio a la mitad.
    </div>
    ${playerRows}
  </div>`;
}

async function saveRascaPlayerCfg(jugador) {
  const k = normKey(jugador);
  if (!RASCA_PLAYER_CFG[k]) RASCA_PLAYER_CFG[k] = {};
  let valid = true;
  RASCA_TIPOS.forEach(t => {
    const wb = parseFloat(document.getElementById(`radm-wb-${jugador}-${t.id}`)?.value) || 0;
    const pm = parseFloat(document.getElementById(`radm-pm-${jugador}-${t.id}`)?.value) || 100;
    if (isNaN(wb) || isNaN(pm)) { valid = false; return; }
    RASCA_PLAYER_CFG[k][t.id] = { win_boost: wb/100, prize_mult: pm/100 };
  });
  if (!valid) { showToast('⚠ Valores inválidos', 'error'); return; }
  await saveRascaCfg();
  showToast(`✅ Config rascas guardada para ${jugador}`, 'success');
}
