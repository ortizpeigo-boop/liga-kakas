<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 LIGA KAKAS LEGENDARY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

  :root {
    --gold: #FFD700; --gold2: #FFA500; --gold3: #ffb938;
    --dark: #06060e; --dark2: #0c0c18; --dark3: #141422;
    --card: #0f0f1d; --card2: #13132a;
    --green: #00ffaa; --red: #ff2244; --blue: #4488ff; --purple: #aa44ff;
    --text: #e8e8f5; --muted: #7070a0;
    --neon-gold: 0 0 8px #ffd70088, 0 0 20px #ffd70044;
    --neon-green: 0 0 8px #00ffaa88, 0 0 20px #00ffaa44;
    --neon-red: 0 0 8px #ff224488, 0 0 20px #ff224444;
    --glow-purple: 0 0 20px #aa44ff44;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--dark); }
  ::-webkit-scrollbar-thumb { background:rgba(255,215,0,.2); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(255,215,0,.4); }

  /* ─── BODY & BACKGROUND ─── */
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,215,0,.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(170,68,255,.04) 0%, transparent 60%),
      radial-gradient(ellipse 30% 30% at 10% 90%, rgba(68,136,255,.03) 0%, transparent 50%);
  }

  /* Grain texture overlay */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity:.4;
  }

  /* ─── LOGIN ─── */
  #loginScreen {
    position:fixed; inset:0; z-index:1000;
    display:flex; align-items:center; justify-content:center;
    background: var(--dark);
    background-image:
      radial-gradient(ellipse 70% 60% at 50% 40%, rgba(255,215,0,.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(170,68,255,.05) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 80% 20%, rgba(68,136,255,.04) 0%, transparent 50%);
  }

  /* Animated lines en login */
  #loginScreen::after {
    content:''; position:absolute; inset:0; pointer-events:none;
    background: repeating-linear-gradient(90deg, transparent, transparent 120px, rgba(255,215,0,.015) 120px, rgba(255,215,0,.015) 121px);
    animation: scanlines 8s linear infinite;
  }
  @keyframes scanlines { from{background-position:0 0} to{background-position:121px 0} }

  .login-box {
    background: linear-gradient(160deg, rgba(20,20,40,.95) 0%, rgba(10,10,20,.98) 100%);
    border: 1px solid rgba(255,215,0,.25);
    border-radius: 20px;
    padding: 40px 36px;
    width: 420px; max-width: 95vw;
    max-height: 96vh; overflow-y: auto;
    text-align: center;
    box-shadow: 0 0 0 1px rgba(255,215,0,.05), 0 0 60px rgba(255,215,0,.08), 0 40px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.06);
    animation: loginAppear .7s cubic-bezier(.34,1.56,.64,1);
    position: relative; overflow-y: auto; scrollbar-width: none;
  }
  .login-box::-webkit-scrollbar { display: none; }
  @media(max-width:450px) {
    .login-box { padding: 28px 20px; border-radius:16px; }
    .login-logo { font-size:36px !important; }
    .zona-grid { gap:8px; }
    .zona-btn { padding:16px 8px; }
    .zona-icon { font-size:30px; }
    .zona-title { font-size:16px; }
  }
  .login-box::before {
    content:''; position:absolute; top:-1px; left:20%; right:20%; height:1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,.6), transparent);
  }
  @keyframes loginAppear { from{opacity:0;transform:translateY(40px) scale(.92)} to{opacity:1;transform:none} }

  .login-logo {
    font-family: 'Cinzel Decorative', 'Bebas Neue', sans-serif;
    font-size: 48px; font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #ffe066 0%, #FFD700 30%, #fff8a0 50%, #FFD700 70%, #ffa500 100%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1; margin-bottom: 2px;
    animation: shimmerText 3s linear infinite;
    filter: drop-shadow(0 0 20px rgba(255,215,0,.4));
  }
  @keyframes shimmerText { from{background-position:-200% center} to{background-position:200% center} }

  .login-subtitle { color:var(--muted); font-size:12px; letter-spacing:5px; text-transform:uppercase; margin-bottom:32px; font-weight:500; }

  /* ── Zona selection en login ────────────────────────────────── */
  #zonaStep { display:none; }
  .zona-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0; }
  .zona-btn {
    border-radius:16px; padding:22px 12px; border:2px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.03); cursor:pointer;
    transition:all .3s cubic-bezier(.34,1.4,.64,1);
    text-align:center; position:relative; overflow:hidden;
  }
  .zona-btn::before {
    content:''; position:absolute; inset:0; opacity:0; transition:opacity .3s;
    background: linear-gradient(135deg, currentColor, transparent);
  }
  .zona-btn:hover { transform:translateY(-4px); }
  .zona-btn:hover::before { opacity:.08; }
  .zona-btn.selected { transform:scale(1.04); }
  .zona-btn-apuestas {
    border-color:rgba(255,215,0,.3);
    box-shadow:0 4px 20px rgba(255,215,0,.08);
  }
  .zona-btn-apuestas.selected {
    border-color:var(--gold);
    background:rgba(255,215,0,.1);
    box-shadow:0 8px 30px rgba(255,215,0,.25), var(--neon-gold);
  }
  .zona-btn-casino {
    border-color:rgba(0,255,170,.3);
    box-shadow:0 4px 20px rgba(0,255,170,.08);
  }
  .zona-btn-casino.selected {
    border-color:var(--green);
    background:rgba(0,255,170,.1);
    box-shadow:0 8px 30px rgba(0,255,170,.2), var(--neon-green);
  }
  .zona-btn-todo {
    grid-column: 1 / -1;
    border-color:rgba(170,68,255,.3);
    box-shadow:0 4px 20px rgba(170,68,255,.06);
  }
  .zona-btn-todo.selected {
    border-color:var(--purple);
    background:rgba(170,68,255,.1);
    box-shadow:0 8px 30px rgba(170,68,255,.2), var(--glow-purple);
  }
  .zona-icon { font-size:40px; margin-bottom:8px; display:block; line-height:1; }
  .zona-title {
    font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px;
    margin-bottom:4px;
  }
  .zona-desc { font-size:11px; color:var(--muted); letter-spacing:1px; line-height:1.5; }
  #zona-step-title {
    font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:4px;
    color:var(--muted); text-align:center; margin-bottom:4px; text-transform:uppercase;
  }
  .zona-user-confirm {
    text-align:center; margin-bottom:16px;
    font-size:14px; color:rgba(255,255,255,.6); letter-spacing:1px;
  }
  .zona-user-confirm strong { color:var(--gold); }
  #zonaEntrarBtn {
    opacity:.4; pointer-events:none; transition:opacity .3s;
  }
  #zonaEntrarBtn.ready { opacity:1; pointer-events:auto; }
  .player-select { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }

  .player-btn {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    color: var(--text);
    padding: 13px 8px;
    border-radius: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: all .25s cubic-bezier(.34,1.56,.64,1);
    letter-spacing: 1px;
    position: relative; overflow: hidden;
  }
  .player-btn::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,215,0,.08) 0%, transparent 60%);
    opacity:0; transition: opacity .2s;
  }
  .player-btn:hover { border-color:rgba(255,215,0,.4); color:var(--gold); transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.4), var(--neon-gold); }
  .player-btn:hover::before { opacity:1; }
  .player-btn.selected { border-color:var(--gold); background:rgba(255,215,0,.1); color:var(--gold); box-shadow: var(--neon-gold); }

  .admin-btn {
    background: rgba(170,68,255,.08);
    border-color: rgba(170,68,255,.25); color: #cc88ff;
    grid-column: 1/-1; font-size: 12px; letter-spacing: 3px;
  }
  .admin-btn:hover, .admin-btn.selected {
    border-color: var(--purple); color: #dd99ff;
    background: rgba(170,68,255,.15);
    box-shadow: var(--glow-purple);
  }
  .password-input {
    width:100%; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.1);
    color:var(--text); padding:14px 16px; border-radius:12px;
    font-family:'Rajdhani',sans-serif; font-size:18px; letter-spacing:6px;
    margin-bottom:14px; text-align:center;
    transition: all .2s;
  }
  .password-input:focus { outline:none; border-color:var(--gold); box-shadow: var(--neon-gold); }
  .login-btn {
    width:100%;
    background: linear-gradient(135deg, #ffe566 0%, #FFD700 40%, #ff9800 100%);
    color: #0a0a0f; border:none;
    padding:16px; border-radius:12px;
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px;
    cursor:pointer; transition:all .25s;
    box-shadow: 0 4px 20px rgba(255,215,0,.3);
    position:relative; overflow:hidden;
  }
  .login-btn::after {
    content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
    animation: btnShine 3s ease infinite;
  }
  @keyframes btnShine { 0%{left:-100%} 40%,100%{left:150%} }
  .login-btn:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(255,215,0,.4); }
  .login-error { color:var(--red); font-size:13px; margin-top:10px; min-height:20px; letter-spacing:1px; font-weight:600; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  .shake { animation:shake .4s ease; }

  /* ─── APP ─── */
  #app { display:none; }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(180deg, rgba(14,14,28,.98) 0%, rgba(10,10,20,.95) 100%);
    border-bottom: 1px solid rgba(255,215,0,.12);
    padding: 0 28px;
    display: flex; align-items:center; justify-content:space-between;
    height: 64px;
    position: sticky; top:0; z-index:200;
    backdrop-filter: blur(20px) saturate(1.5);
    box-shadow: 0 1px 0 rgba(255,215,0,.06), 0 4px 30px rgba(0,0,0,.6);
  }
  .header-logo {
    font-family: 'Cinzel Decorative', 'Bebas Neue', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: 3px;
    background: linear-gradient(135deg, #ffe066, #FFD700, #ffa500);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px rgba(255,215,0,.4));
    animation: shimmerText 4s linear infinite;
  }
  .user-badge {
    background: rgba(255,215,0,.08);
    border: 1px solid rgba(255,215,0,.2);
    color: var(--gold); padding: 6px 16px;
    border-radius: 30px; font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
    box-shadow: var(--neon-gold);
  }
  .admin-badge { background:rgba(170,68,255,.12); border-color:rgba(170,68,255,.3); color:#cc88ff; box-shadow:var(--glow-purple); }
  .logout-btn {
    background: none; border: 1px solid rgba(255,255,255,.08);
    color: var(--muted); padding: 6px 14px; border-radius: 8px;
    cursor: pointer; font-family:'Rajdhani',sans-serif; font-size: 13px;
    letter-spacing: 1px; transition: all .2s; margin-left: 8px; font-weight:600;
  }
  .logout-btn:hover { border-color:var(--red); color:var(--red); box-shadow:var(--neon-red); }

  /* ─── NAV ─── */
  .nav {
    background: rgba(10,10,20,.95);
    border-bottom: 1px solid rgba(255,255,255,.04);
    padding: 0 20px;
    display: flex; gap: 2px;
    overflow-x: auto; scrollbar-width: none;
    backdrop-filter: blur(10px);
  }
  .nav::-webkit-scrollbar { display:none; }
  .nav-tab {
    background: none; border: none;
    color: rgba(112,112,160,.8);
    padding: 16px 14px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all .2s; white-space: nowrap;
    position: relative;
  }
  .nav-tab:hover { color: rgba(255,215,0,.7); }
  .nav-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
    text-shadow: 0 0 12px rgba(255,215,0,.5);
  }
  .nav-tab.active::before {
    content:''; position:absolute; bottom:-1px; left:10%; right:10%; height:2px;
    background: var(--gold);
    filter: blur(4px);
    border-radius: 2px;
  }

  /* ─── MAIN ─── */
  .main { padding: 28px 24px; max-width: 1100px; margin: 0 auto; position:relative; z-index:1; }

  /* ─── CARDS ─── */
  .card {
    background: linear-gradient(160deg, rgba(20,20,42,.92) 0%, rgba(12,12,26,.96) 100%);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 18px; padding: 22px;
    margin-bottom: 18px;
    box-shadow: 0 6px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05), 0 0 0 1px rgba(255,255,255,.02);
    position: relative; overflow: hidden;
    animation: cardReveal .4s cubic-bezier(.34,1.2,.64,1) both;
    backdrop-filter: blur(4px);
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,215,0,.18) 30%, rgba(255,215,0,.1) 60%, transparent 100%);
  }
  .card::after {
    content:''; position:absolute; inset:0; pointer-events:none; border-radius:18px;
    background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255,215,0,.03) 0%, transparent 70%);
  }
  @keyframes cardReveal { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
  .card:nth-child(2){animation-delay:.05s} .card:nth-child(3){animation-delay:.1s} .card:nth-child(4){animation-delay:.15s}

  .card-title { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-bottom:16px; font-weight:700; }
  .card-value { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:2px; }
  .positive { color:var(--green); text-shadow: var(--neon-green); }
  .negative { color:var(--red); text-shadow: var(--neon-red); }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 4px; color: var(--gold);
    margin-bottom: 22px;
    text-shadow: var(--neon-gold);
    position: relative; display: inline-block;
  }
  .section-title::after {
    content:''; display:block; height:2px; margin-top:4px;
    background: linear-gradient(90deg, var(--gold), var(--gold2), transparent);
    border-radius: 2px;
  }

  /* ── Grids desktop ────────────────────────────────────────────── */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }

  @media(max-width:900px) {
    .grid-3 { grid-template-columns:1fr 1fr; }
    .grid-4 { grid-template-columns:1fr 1fr; }
  }

  /* ── Móvil: scroll horizontal en lugar de colapsar ────────────── */
  @media(max-width:600px) {
    .main { padding:12px 10px; }

    /* grid-2: colapsa a 1 columna (son 2, cabe) */
    .grid-2 { grid-template-columns:1fr; }

    /* grid-3 y grid-4: scroll horizontal con cards de ancho fijo */
    .grid-3, .grid-4 {
      display:flex;
      flex-wrap:nowrap;
      overflow-x:auto;
      gap:12px;
      padding-bottom:10px;
      padding-left:2px;
      padding-right:2px;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      -ms-overflow-style:none;
    }
    .grid-3::-webkit-scrollbar, .grid-4::-webkit-scrollbar { display:none; }
    .grid-3 > *, .grid-4 > * {
      flex:0 0 calc(50vw - 20px);
      min-width:130px;
      max-width:200px;
      scroll-snap-align:start;
    }
    /* Indicador de scroll (fade derecha) */
    .grid-3-wrap, .grid-4-wrap { position:relative; }
    .grid-3-wrap::after, .grid-4-wrap::after {
      content:'›';
      position:absolute; right:0; top:50%; transform:translateY(-50%);
      width:28px; height:100%;
      background:linear-gradient(to right, transparent, rgba(6,6,14,.9));
      display:flex; align-items:center; justify-content:flex-end;
      color:rgba(255,215,0,.5); font-size:20px; pointer-events:none;
    }

    /* Cards en móvil: padding reducido */
    .card { padding: 16px 14px; border-radius:14px; }
    .section-title { font-size:22px; }

    /* Tablas: scroll horizontal en móvil */
    .table-scroll-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .data-table { min-width:480px; }
  }

  /* ─── RANKING ─── */
  .rank-card {
    background: linear-gradient(135deg, rgba(18,18,36,.9) 0%, rgba(12,12,24,.95) 100%);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px; padding: 16px 22px;
    display: flex; align-items:center; gap:18px;
    margin-bottom: 10px;
    transition: all .3s cubic-bezier(.34,1.3,.64,1);
    animation: rankSlide .5s cubic-bezier(.34,1.2,.64,1) both;
    position: relative; overflow:hidden;
  }
  .rank-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: transparent; border-radius:2px 0 0 2px;
    transition: background .3s;
  }
  .rank-card:hover { border-color:rgba(255,215,0,.2); transform:translateX(4px); box-shadow:0 8px 30px rgba(0,0,0,.4); }
  .rank-card:hover::before { background:var(--gold); box-shadow:var(--neon-gold); }
  .rank-card:nth-child(1){animation-delay:.05s; border-color:rgba(255,215,0,.15);}
  .rank-card:nth-child(2){animation-delay:.1s}
  .rank-card:nth-child(3){animation-delay:.15s; border-color:rgba(192,192,192,.1);}
  .rank-card:nth-child(4){animation-delay:.2s}
  .rank-card:nth-child(5){animation-delay:.25s}
  .rank-card:nth-child(6){animation-delay:.3s}
  @keyframes rankSlide { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:none} }

  .rank-num { font-family:'Bebas Neue',sans-serif; font-size:34px; color:var(--muted); min-width:44px; }
  .rank-num.gold { color:var(--gold); text-shadow:var(--neon-gold); }
  .rank-num.silver { color:#d0d0d0; text-shadow:0 0 8px rgba(200,200,200,.5); }
  .rank-num.bronze { color:#cd8040; text-shadow:0 0 8px rgba(205,128,64,.5); }
  .player-name { font-size:20px; font-weight:700; letter-spacing:1px; flex:1; }
  .banca-val { font-family:'Bebas Neue',sans-serif; font-size:30px; }
  .profit-pos { color:var(--green); }
  .profit-neg { color:var(--red); }
  /* Efecto shine en el 1er puesto */
  .rank-card:first-child .banca-val {
    background: linear-gradient(90deg, var(--gold), #fff8a0 40%, var(--gold) 60%, var(--gold2) 100%);
    background-size:200% auto;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    animation: shimmerText 2s linear infinite;
  }

  /* ─── STATS ─── */
  .mini-stat { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid rgba(255,255,255,.04); }
  .mini-stat:last-child { border-bottom:none; }
  .mini-stat-label { color:var(--muted); font-size:13px; letter-spacing:1.5px; font-weight:600; text-transform:uppercase; }
  .mini-stat-value { font-weight:700; font-size:18px; letter-spacing:.5px; }

  /* ─── TABLE ─── */
  .data-table { width:100%; border-collapse:collapse; font-size:14px; }
  .data-table th { color:var(--muted); font-size:11px; letter-spacing:2.5px; text-transform:uppercase; padding:12px 14px; text-align:left; border-bottom:1px solid rgba(255,255,255,.07); font-weight:700; }
  .data-table td { padding:11px 14px; border-bottom:1px solid rgba(255,255,255,.03); transition:background .15s; }
  .data-table tr:hover td { background:rgba(255,215,0,.025); }

  /* ─── BADGES ─── */
  .badge-win { background:rgba(0,255,170,.12); color:var(--green); border:1px solid rgba(0,255,170,.3); padding:3px 12px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1.5px; text-shadow:var(--neon-green); }
  .badge-lose { background:rgba(255,34,68,.12); color:var(--red); border:1px solid rgba(255,34,68,.3); padding:3px 12px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1.5px; }
  .badge-pending { background:rgba(255,165,0,.12); color:var(--gold2); border:1px solid rgba(255,165,0,.3); padding:3px 12px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1.5px; }
  .badge-approval { background:rgba(68,136,255,.12); color:var(--blue); border:1px solid rgba(68,136,255,.3); padding:3px 12px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1.5px; }

  /* ─── FORMS ─── */
  .form-group { margin-bottom:18px; }
  .form-label { display:block; color:var(--muted); font-size:11px; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:8px; font-weight:700; }
  .form-input,.form-select {
    width:100%; background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.09);
    color:var(--text); padding:13px 16px; border-radius:12px;
    font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:600;
    transition: all .2s;
  }
  .form-input:focus,.form-select:focus { outline:none; border-color:rgba(255,215,0,.5); box-shadow:var(--neon-gold); background:rgba(255,215,0,.03); }
  .form-select option { background:var(--dark3); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:500px) { .form-row{grid-template-columns:1fr} }

  /* ─── BUTTONS ─── */
  .btn-primary {
    background: linear-gradient(135deg, #ffe566 0%, #FFD700 40%, #ff9500 100%);
    color: #0a0a0e; border:none;
    padding: 14px 28px; border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px;
    cursor: pointer; transition: all .25s;
    box-shadow: 0 4px 16px rgba(255,215,0,.25), inset 0 1px 0 rgba(255,255,255,.3);
    position: relative; overflow: hidden;
  }
  .btn-primary::after {
    content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
    transition: left .4s;
  }
  .btn-primary:hover { transform:translateY(-3px); box-shadow:0 10px 35px rgba(255,215,0,.4), var(--neon-gold); }
  .btn-primary:hover::after { left:150%; }
  .btn-primary:active { transform:translateY(0); }
  .btn-primary:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

  .btn-small { background:rgba(0,255,170,.1); border:1px solid rgba(0,255,170,.25); color:var(--green); padding:6px 14px; border-radius:8px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; transition:all .2s; }
  .btn-small:hover { background:rgba(0,255,170,.2); box-shadow:var(--neon-green); }
  .btn-danger { background:rgba(255,34,68,.1); border:1px solid rgba(255,34,68,.25); color:var(--red); padding:6px 14px; border-radius:8px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; transition:all .2s; }
  .btn-danger:hover { background:rgba(255,34,68,.2); box-shadow:var(--neon-red); }
  .btn-blue { background:rgba(68,136,255,.1); border:1px solid rgba(68,136,255,.25); color:var(--blue); padding:6px 14px; border-radius:8px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700; letter-spacing:1px; transition:all .2s; }
  .btn-blue:hover { background:rgba(68,136,255,.2); }

  /* ─── ADMIN PANEL ─── */
  .admin-panel { background:rgba(170,68,255,.05); border:1px solid rgba(170,68,255,.12); border-radius:16px; padding:22px; margin-bottom:16px; }
  .admin-title { color:#cc88ff; font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-bottom:16px; font-weight:700; }

  /* ─── JACKPOT ─── */
  .jackpot-display {
    background: linear-gradient(135deg, rgba(255,215,0,.08) 0%, rgba(255,165,0,.04) 100%);
    border: 1px solid rgba(255,215,0,.25);
    border-radius: 18px; padding: 36px; text-align:center; margin-bottom:22px;
    position:relative; overflow:hidden;
    box-shadow: inset 0 0 60px rgba(255,215,0,.04);
  }
  .jackpot-display::before {
    content:''; position:absolute; inset:-1px;
    border-radius:18px;
    background: linear-gradient(135deg, rgba(255,215,0,.2), transparent 40%, transparent 60%, rgba(255,165,0,.15));
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude; padding:1px;
  }
  .jackpot-label { color:var(--muted); font-size:11px; letter-spacing:4px; text-transform:uppercase; margin-bottom:10px; font-weight:700; }
  .jackpot-amount { font-family:'Bebas Neue',sans-serif; font-size:72px; letter-spacing:4px; color:var(--gold); line-height:1; animation:jackpotPulse 2.5s ease-in-out infinite; }

  /* ─── RULETA ─── */
  .ruleta-board { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; max-width:370px; margin:0 auto 20px; }
  .ruleta-num {
    width:100%; aspect-ratio:1; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px; cursor:pointer;
    transition: all .2s cubic-bezier(.34,1.56,.64,1);
    border:2px solid transparent; user-select:none;
  }
  .ruleta-num.rojo { background:linear-gradient(135deg,#b91c2c,#991020); color:#fff; }
  .ruleta-num.negro { background:linear-gradient(135deg,#1e1e2e,#131320); color:#ddd; border-color:rgba(255,255,255,.1); }
  .ruleta-num.verde { background:linear-gradient(135deg,#16a34a,#0d6b32); color:#fff; }
  .ruleta-num:hover { transform:scale(1.12); filter:brightness(1.3); }
  .ruleta-num.selected { transform:scale(1.18); border-color:var(--gold) !important; box-shadow:var(--neon-gold); filter:brightness(1.2); }

  .ruleta-result { font-family:'Bebas Neue',sans-serif; font-size:80px; text-align:center; padding:20px 0; }
  .ruleta-spinning { font-family:'Bebas Neue',sans-serif; font-size:80px; text-align:center; padding:20px; animation:spinFast .4s linear infinite; }
  @keyframes spinFast { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* ─── CASINO TIPOS ─── */
  .casino-tipo-btn {
    background: rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07);
    color:var(--text); padding:12px 16px; border-radius:12px;
    cursor:pointer; font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700;
    letter-spacing:1.5px; transition:all .2s; text-align:center; text-transform:uppercase;
  }
  .casino-tipo-btn:hover { border-color:rgba(255,215,0,.3); color:var(--gold); }
  .casino-tipo-btn.active { border-color:rgba(255,215,0,.5); background:rgba(255,215,0,.08); color:var(--gold); box-shadow:var(--neon-gold); }

  /* ─── RACHAS ─── */
  .racha-pos { background:rgba(0,255,170,.1); color:var(--green); border:1px solid rgba(0,255,170,.25); padding:3px 10px; border-radius:6px; font-size:12px; font-weight:700; text-shadow:var(--neon-green); }
  .racha-neg { background:rgba(255,34,68,.1); color:var(--red); border:1px solid rgba(255,34,68,.2); padding:3px 10px; border-radius:6px; font-size:12px; font-weight:700; }

  /* ─── TOAST ─── */
  .toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(90px);
    background:rgba(16,16,32,.97);
    border:1px solid rgba(255,255,255,.1);
    border-radius:14px; padding:15px 28px;
    font-size:15px; font-weight:700; letter-spacing:1.5px;
    z-index:9999; transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none; backdrop-filter:blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:rgba(0,255,170,.4); color:var(--green); box-shadow:0 8px 40px rgba(0,0,0,.6), var(--neon-green); }
  .toast.error { border-color:rgba(255,34,68,.4); color:var(--red); box-shadow:0 8px 40px rgba(0,0,0,.6), var(--neon-red); }

  /* ─── NOTIF BADGE ─── */
  .notif-badge { background:var(--red); color:#fff; border-radius:50%; width:18px; height:18px; font-size:11px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; margin-left:4px; vertical-align:middle; }

  /* ─── PRESTAMOS ─── */
  .loan-card { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.05); border-radius:12px; padding:16px; margin-bottom:10px; }

  /* ─── PLANTILLAS DE APUESTA ─── */
  .plantilla-card {
    background: linear-gradient(135deg, rgba(255,215,0,.06) 0%, rgba(255,165,0,.03) 100%);
    border: 1px solid rgba(255,215,0,.18);
    border-radius: 12px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    transition: all .25s cubic-bezier(.34,1.3,.64,1);
    cursor: pointer; position: relative; overflow: hidden;
  }
  .plantilla-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--gold); border-radius:2px 0 0 2px;
    opacity:.5; transition: opacity .2s;
  }
  .plantilla-card:hover { border-color:rgba(255,215,0,.45); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.4), var(--neon-gold); }
  .plantilla-card:hover::before { opacity:1; }
  .plantilla-evento { font-size:14px; font-weight:700; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .plantilla-meta { font-size:12px; color:var(--muted); margin-top:2px; }
  .plantilla-badge { background:rgba(255,215,0,.12); color:var(--gold); border:1px solid rgba(255,215,0,.3); padding:3px 10px; border-radius:20px; font-family:'Bebas Neue',sans-serif; font-size:16px; white-space:nowrap; }
  .plantillas-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  @media(max-width:600px) { .plantillas-grid { grid-template-columns:1fr; } }

  /* ─── TIENDA ─── */
  .shop-item {
    background: linear-gradient(145deg, rgba(20,20,40,.9), rgba(14,14,28,.95));
    border: 1px solid rgba(255,215,0,.1);
    border-radius: 14px; padding: 20px; text-align:center;
    cursor:pointer; transition: all .3s cubic-bezier(.34,1.4,.64,1);
    position:relative; overflow:hidden;
    animation: cardReveal .4s ease both;
  }
  .shop-item::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(255,215,0,.05) 0%, transparent 60%);
    opacity:0; transition:opacity .3s;
  }
  .shop-item:hover { border-color:rgba(255,215,0,.35); transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,.5), var(--neon-gold); }
  .shop-item:hover::before { opacity:1; }
  .shop-price { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); text-shadow:var(--neon-gold); }

  /* ─── RULETA CANVAS ─── */
  #roulette-canvas { border-radius:50%; box-shadow:0 0 60px rgba(255,215,0,.25), 0 0 120px rgba(0,0,0,.9), 0 0 0 2px rgba(255,215,0,.15); display:block; margin:0 auto; }
  #roulette-wrap { position:relative; display:inline-block; }
  #roulette-pointer { position:absolute; top:-14px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent; border-top:28px solid var(--gold); filter:drop-shadow(0 0 10px rgba(255,215,0,.9)); z-index:10; }
  #center-display { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; background:rgba(0,0,0,.9); border-radius:50%; width:84px; height:84px; display:flex; align-items:center; justify-content:center; border:3px solid rgba(255,215,0,.35); pointer-events:none; box-shadow:var(--neon-gold), inset 0 0 20px rgba(0,0,0,.8); }
  #center-num { font-family:'Bebas Neue',sans-serif; font-size:38px; color:var(--gold); line-height:1; }

  /* ─── EVENTOS ─── */
  .evento-card { background:linear-gradient(145deg,rgba(18,18,36,.9),rgba(12,12,24,.95)); border:1px solid rgba(255,215,0,.12); border-radius:16px; padding:20px; margin-bottom:14px; transition:all .2s; }
  .evento-card:hover { border-color:rgba(255,215,0,.2); }
  .evento-card.activo { border-color:rgba(0,255,170,.25); }
  .evento-card.cerrado { border-color:rgba(255,34,68,.15); opacity:.75; }
  .evento-cuota-badge { background:rgba(255,215,0,.1); color:var(--gold); border:1px solid rgba(255,215,0,.3); padding:4px 14px; border-radius:20px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px; }
  .apostadores-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .apostador-chip { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:4px 14px; font-size:13px; font-weight:700; }

  /* ─── BLACKJACK ─── */
  .bj-area { text-align:center; padding:12px 0; }
  .bj-side-label { font-size:11px; letter-spacing:3px; color:var(--muted); margin-bottom:12px; font-weight:700; text-transform:uppercase; }
  .bj-total { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--text); margin-left:10px; }
  .bj-bust { color:var(--red) !important; text-shadow:var(--neon-red); }
  .bj-blackjack { color:var(--gold) !important; text-shadow:var(--neon-gold); }
  .bj-stand { color:var(--green) !important; }
  .bj-hand { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; }
  .bj-card {
    width:62px; height:92px;
    background: linear-gradient(145deg, #1a1a35, #0e0e24);
    border: 2px solid rgba(255,255,255,.15);
    border-radius: 12px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow: 0 8px 24px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
    animation: cardDeal .3s cubic-bezier(.2,.8,.4,1.2) both;
  }
  .bj-card-red { border-color:rgba(239,68,68,.35); box-shadow:0 8px 24px rgba(0,0,0,.6), 0 0 12px rgba(239,68,68,.1); }
  .bj-card-hidden {
    background: linear-gradient(135deg, #1a1a38, #0a0a20);
    border-color: rgba(255,215,0,.25);
    font-size:36px;
    box-shadow: 0 8px 24px rgba(0,0,0,.6), var(--neon-gold);
  }
  .bj-card-val { font-size:22px; font-weight:700; line-height:1; }
  .bj-card-suit { font-size:22px; line-height:1.3; }
  .bj-card-red .bj-card-val, .bj-card-red .bj-card-suit { color:#ef4444; }
  .bj-divider { height:1px; background:rgba(255,255,255,.05); margin:16px 0; }
  .bj-btns { display:flex; gap:12px; justify-content:center; margin-top:18px; flex-wrap:wrap; }
  .bj-btn-hit  { background:linear-gradient(135deg,#00c853,#007a30) !important; box-shadow:0 4px 16px rgba(0,200,83,.3) !important; }
  .bj-btn-stand{ background:linear-gradient(135deg,#d32f2f,#8b0000) !important; box-shadow:0 4px 16px rgba(211,47,47,.3) !important; }
  .bj-btn-double{ background:linear-gradient(135deg,#ff8f00,#e65100) !important; box-shadow:0 4px 16px rgba(255,143,0,.3) !important; }
  @keyframes cardDeal { from{opacity:0;transform:translateY(-22px) scale(.8) rotate(-5deg)} to{opacity:1;transform:none} }

  /* ─── CASINO RESULTADO ─── */
  .result-win-anim {
    animation: winReveal .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  .result-lose-anim {
    animation: loseReveal .5s ease both;
  }
  @keyframes winReveal {
    0%{opacity:0;transform:scale(.5) translateY(20px)}
    60%{transform:scale(1.08) translateY(-4px)}
    100%{opacity:1;transform:scale(1) translateY(0)}
  }
  @keyframes loseReveal {
    0%{opacity:0;transform:scale(.9)}
    20%{transform:scale(1) translateX(-6px)}
    40%{transform:scale(1) translateX(6px)}
    60%{transform:scale(1) translateX(-4px)}
    80%{transform:scale(1) translateX(4px)}
    100%{opacity:1;transform:scale(1) translateX(0)}
  }

  /* ─── ANIMACIONES GLOBALES ─── */
  @keyframes winPulse { 0%{box-shadow:0 0 0 0 rgba(0,255,170,.7)} 70%{box-shadow:0 0 0 20px rgba(0,255,170,0)} 100%{box-shadow:0 0 0 0 rgba(0,255,170,0)} }
  @keyframes goldShine { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes rankAppear { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
  @keyframes jackpotPulse {
    0%,100%{text-shadow:0 0 20px rgba(255,215,0,.5);transform:scale(1)}
    50%{text-shadow:0 0 40px rgba(255,215,0,1),0 0 80px rgba(255,165,0,.6),0 0 120px rgba(255,100,0,.3);transform:scale(1.04)}
  }
  @keyframes slideInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { 0%{transform:scale(.4);opacity:0} 60%{transform:scale(1.18);opacity:1} 100%{transform:scale(1);opacity:1} }
  @keyframes floatBadge { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  .jackpot-amount { animation:jackpotPulse 2.5s ease-in-out infinite; }
  .badge-win { animation:floatBadge 2s ease-in-out infinite; }
  .racha-pos { animation:floatBadge 1.5s ease-in-out infinite; }
  .shop-item:nth-child(1){animation-delay:.05s} .shop-item:nth-child(2){animation-delay:.1s} .shop-item:nth-child(3){animation-delay:.15s}

  /* ─── CHAT ─── */
  .chat-box { height:420px; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .chat-msg { max-width:75%; padding:12px 16px; border-radius:16px; font-size:15px; line-height:1.4; animation:slideInUp .2s ease; font-weight:500; }
  .chat-msg-mine { background:rgba(255,215,0,.1); border:1px solid rgba(255,215,0,.18); margin-left:auto; border-bottom-right-radius:4px; }
  .chat-msg-other { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); margin-right:auto; border-bottom-left-radius:4px; }
  .chat-author { font-size:11px; color:var(--muted); letter-spacing:1.5px; margin-bottom:4px; font-weight:700; text-transform:uppercase; }
  .chat-time { font-size:10px; color:var(--muted); margin-top:4px; text-align:right; }
  .chat-input-row { display:flex; gap:10px; padding:14px 16px; border-top:1px solid rgba(255,255,255,.05); }
  .chat-input { flex:1; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.09); color:var(--text); padding:12px 16px; border-radius:12px; font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; }
  .chat-input:focus { outline:none; border-color:rgba(255,215,0,.4); box-shadow:var(--neon-gold); }

  /* ─── LOGROS ─── */
  .logro-card { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:14px; padding:16px 18px; display:flex; align-items:center; gap:16px; margin-bottom:8px; transition:all .25s; }
  .logro-card.earned { border-color:rgba(255,215,0,.25); background:rgba(255,215,0,.04); box-shadow:var(--neon-gold); }
  .logro-card.locked { opacity:.4; filter:grayscale(.5); }
  .logro-icon { font-size:34px; min-width:44px; text-align:center; }
  .logro-name { font-size:16px; font-weight:700; letter-spacing:.5px; }
  .logro-desc { font-size:12px; color:var(--muted); margin-top:2px; letter-spacing:.5px; }
  .logro-check { margin-left:auto; font-size:22px; }

  /* ─── CALENDARIO ─── */
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day-label { text-align:center; color:var(--muted); font-size:11px; letter-spacing:1.5px; padding:6px 0; font-weight:700; text-transform:uppercase; }
  .cal-day { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.04); border-radius:8px; padding:8px 6px; min-height:60px; font-size:13px; font-weight:700; }
  .cal-day.today { border-color:rgba(255,215,0,.35); background:rgba(255,215,0,.05); }
  .cal-day.has-bets { border-color:rgba(255,165,0,.2); }
  .cal-day.other-month { opacity:.25; }
  .cal-badge-dot { background:var(--gold2); color:#000; border-radius:12px; padding:2px 7px; font-size:11px; font-weight:700; display:inline-block; margin-top:4px; }

  /* ─── P2P ─── */
  .p2p-card { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.06); border-radius:12px; padding:16px; margin-bottom:10px; }
  .p2p-card.pendiente { border-color:rgba(255,165,0,.25); }
  .p2p-card.activa { border-color:rgba(0,255,170,.2); }

  /* ─── NOTIFICACIONES ─── */
  .notif-item { display:flex; gap:14px; align-items:flex-start; padding:14px 0; border-bottom:1px solid rgba(255,255,255,.04); }
  .notif-item.unread { background:rgba(255,215,0,.025); border-radius:10px; padding:12px 14px; margin-bottom:4px; }
  .notif-dot { width:8px; height:8px; background:var(--gold); border-radius:50%; margin-top:6px; flex-shrink:0; box-shadow:var(--neon-gold); }
  .notif-dot.read { background:var(--muted); box-shadow:none; }

  /* ─── MISC ─── */
  .mini-bar { height:8px; background:rgba(255,255,255,.05); border-radius:4px; overflow:hidden; margin-top:4px; }
  .mini-bar-fill { height:100%; border-radius:4px; transition:width .8s cubic-bezier(.34,1.2,.64,1); }
  .slots-reel { font-size:68px; text-align:center; padding:10px 0; line-height:1; min-width:90px; display:inline-block; }
  .dado { font-size:76px; display:inline-block; }

  /* ─── JACKPOT OVERLAY ─── */
  #jackpot-overlay {
    position:fixed; inset:0; z-index:9998;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.88);
    backdrop-filter:blur(8px) saturate(1.5);
  }
  #jackpot-overlay.show { display:flex; }
  .jackpot-celebration { text-align:center; animation:popIn .7s cubic-bezier(.34,1.56,.64,1); }
  .jackpot-name-big { font-family:'Cinzel Decorative','Bebas Neue',sans-serif; font-size:clamp(44px,10vw,92px); line-height:1.1; letter-spacing:4px; }
  .jackpot-amount-big { font-family:'Bebas Neue',sans-serif; font-size:clamp(32px,7vw,64px); color:var(--green); text-shadow:var(--neon-green); }

  /* ─── CONFETTI ─── */
  .confetti-piece { position:fixed; border-radius:3px; animation:confettiFall linear forwards; pointer-events:none; z-index:9999; }
  @keyframes confettiFall {
    0%{transform:translateY(-30px) rotate(0deg) scaleX(1);opacity:1}
    50%{transform:translateY(50vh) rotate(360deg) scaleX(-1);opacity:.9}
    100%{transform:translateY(110vh) rotate(720deg) scaleX(1);opacity:0}
  }

  /* ─── WIN FLASH ─── */
  #win-flash {
    position:fixed; inset:0; pointer-events:none; z-index:8000;
    background:radial-gradient(ellipse at center, rgba(0,255,170,.15) 0%, transparent 70%);
    opacity:0; transition:opacity .1s;
  }
  #win-flash.active { opacity:1; animation:flashOut .8s ease forwards; }
  @keyframes flashOut { 0%{opacity:1} 100%{opacity:0} }

  /* ─── LOSE FLASH ─── */
  #lose-flash {
    position:fixed; inset:0; pointer-events:none; z-index:8000;
    background:radial-gradient(ellipse at center, rgba(255,34,68,.12) 0%, transparent 70%);
    opacity:0;
  }
  #lose-flash.active { opacity:1; animation:flashOut .6s ease forwards; }

  /* ─── PARTÍCULAS WIN ─── */
  .win-particle {
    position:fixed; pointer-events:none; z-index:8001;
    font-size:24px; animation:particleFloat linear forwards;
  }
  @keyframes particleFloat {
    0%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(-120px) scale(.3)}
  }

  /* ══════════════════════════════════════════════════════════════
     MEGA ANIMATIONS & DECORATIONS — LIGA KAKAS LEGENDARY
     ══════════════════════════════════════════════════════════════ */

  /* ── Page transition ─────────────────────────────────────────── */
  .page-enter {
    animation: pageEnter .35s cubic-bezier(.2,.8,.4,1) both;
  }
  @keyframes pageEnter {
    from { opacity:0; transform:translateY(18px) scale(.98); }
    to   { opacity:1; transform:none; }
  }

  /* ── WIN overlay — big cinematic ──────────────────────────────── */
  #win-overlay {
    position:fixed; inset:0; pointer-events:none; z-index:8500;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
  }
  #win-overlay.burst {
    animation: winOverlayFlash .9s cubic-bezier(.2,.8,.4,1) forwards;
  }
  @keyframes winOverlayFlash {
    0%  { opacity:0; }
    15% { opacity:1; }
    80% { opacity:1; }
    100%{ opacity:0; }
  }
  #win-overlay-bg {
    position:absolute; inset:0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%,
      rgba(0,255,170,.18) 0%, rgba(255,215,0,.06) 50%, transparent 75%);
  }
  #win-overlay-text {
    position:relative; text-align:center;
    animation: winTextPop .6s cubic-bezier(.34,1.56,.64,1) .05s both;
  }
  @keyframes winTextPop {
    from { transform:scale(.3) translateY(30px); opacity:0; }
    60%  { transform:scale(1.12); opacity:1; }
    to   { transform:scale(1); opacity:1; }
  }
  .win-overlay-label {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(52px,12vw,96px); letter-spacing:8px;
    color:var(--green); line-height:1;
    text-shadow: 0 0 30px rgba(0,255,170,.9), 0 0 60px rgba(0,255,170,.4), 0 0 100px rgba(0,255,170,.2);
    filter: drop-shadow(0 4px 20px rgba(0,255,170,.5));
  }
  .win-overlay-amount {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(36px,8vw,64px); letter-spacing:4px;
    color:var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,.8), 0 0 40px rgba(255,215,0,.4);
    margin-top:4px;
  }

  /* ── LOSE overlay ─────────────────────────────────────────────── */
  #lose-overlay {
    position:fixed; inset:0; pointer-events:none; z-index:8500;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
  }
  #lose-overlay.burst {
    animation: loseOverlayFlash .8s ease forwards;
  }
  @keyframes loseOverlayFlash {
    0%  { opacity:0; }
    12% { opacity:1; }
    70% { opacity:1; }
    100%{ opacity:0; }
  }
  #lose-overlay-bg {
    position:absolute; inset:0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%,
      rgba(255,34,68,.16) 0%, rgba(180,0,0,.04) 60%, transparent 80%);
  }
  #lose-overlay-text {
    position:relative; text-align:center;
    animation: loseTextShake .5s ease .05s both;
  }
  @keyframes loseTextShake {
    0%   { transform:scale(.5); opacity:0; }
    20%  { transform:scale(1.05) translateX(-6px); opacity:1; }
    40%  { transform:scale(1) translateX(6px); }
    60%  { transform:scale(1) translateX(-4px); }
    80%  { transform:translateX(4px); }
    100% { transform:none; }
  }
  .lose-overlay-label {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(52px,12vw,96px); letter-spacing:8px;
    color:var(--red); line-height:1;
    text-shadow: 0 0 30px rgba(255,34,68,.9), 0 0 60px rgba(255,34,68,.4);
  }
  .lose-overlay-amount {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(28px,6vw,52px); letter-spacing:4px;
    color:rgba(255,100,120,.8); margin-top:4px;
  }

  /* ── Floating coins background on casino pages ─────────────────── */
  .casino-coins {
    position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:0;
  }
  .floating-coin {
    position:absolute; font-size:16px; opacity:.08;
    animation: coinFloat linear infinite;
  }
  @keyframes coinFloat {
    0%   { transform:translateY(0) rotate(0deg); opacity:.08; }
    50%  { opacity:.14; }
    100% { transform:translateY(-100vh) rotate(360deg); opacity:0; }
  }

  /* ── rank-card improvements ──────────────────────────────────── */
  .rank-card-1st {
    background: linear-gradient(135deg, rgba(255,215,0,.1) 0%, rgba(20,18,36,.95) 50%) !important;
    border-color: rgba(255,215,0,.3) !important;
    box-shadow: 0 4px 30px rgba(255,215,0,.12), inset 0 1px 0 rgba(255,215,0,.15) !important;
  }
  .rank-card-1st::before { background:var(--gold) !important; box-shadow:var(--neon-gold) !important; opacity:1 !important; }

  /* ── Player avatar chips in ranking ─────────────────────────── */
  .player-avatar {
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px;
    border:2px solid rgba(255,255,255,.1); flex-shrink:0;
    position:relative;
  }
  .player-avatar::after {
    content:''; position:absolute; inset:-3px; border-radius:50%;
    border:1px solid transparent;
    background: linear-gradient(135deg, currentColor, transparent) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:destination-out; mask-composite:exclude;
    opacity:.3;
  }

  /* ── Win streak glow on rank card ─────────────────────────────── */
  .streak-fire {
    display:inline-block;
    animation: streakGlow 1.2s ease-in-out infinite;
  }
  @keyframes streakGlow {
    0%,100% { filter:drop-shadow(0 0 4px rgba(255,160,0,.4)); }
    50%      { filter:drop-shadow(0 0 12px rgba(255,100,0,.9)); }
  }

  /* ── Button press effect ─────────────────────────────────────── */
  .btn-primary:active, .btn-small:active, .btn-danger:active {
    transform:scale(.96) translateY(1px) !important;
    transition: transform .08s !important;
  }

  /* ── Número animado counter ──────────────────────────────────── */
  .count-up {
    display:inline-block;
    animation: countUp .6s cubic-bezier(.2,.8,.4,1) both;
  }
  @keyframes countUp {
    from { opacity:0; transform:translateY(12px) scale(.8); }
    to   { opacity:1; transform:none; }
  }

  /* ── Enhanced jackpot display ─────────────────────────────────── */
  .jackpot-display {
    box-shadow: inset 0 0 60px rgba(255,215,0,.04), 0 0 0 1px rgba(255,215,0,.08), 0 8px 40px rgba(0,0,0,.6) !important;
  }
  .jackpot-display::after {
    content:''; position:absolute; top:-1px; left:10%; right:10%; height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,215,0,.7), transparent);
    border-radius:1px;
  }

  /* ── Result text for casino games ────────────────────────────── */
  .result-text-win {
    background: linear-gradient(135deg, #00ffaa, #00cc88);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px rgba(0,255,170,.6));
    animation: winReveal .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .result-text-lose {
    color: var(--red);
    text-shadow: 0 0 16px rgba(255,34,68,.5);
    animation: loseReveal .5s ease both;
  }

  /* ── Card stagger better ─────────────────────────────────────── */
  .card:nth-child(1){animation-delay:.02s}
  .card:nth-child(2){animation-delay:.07s}
  .card:nth-child(3){animation-delay:.12s}
  .card:nth-child(4){animation-delay:.17s}
  .card:nth-child(5){animation-delay:.22s}
  .card:nth-child(6){animation-delay:.27s}

  /* ── Improved rank first place crown ──────────────────────────── */
  @keyframes crownFloat {
    0%,100% { transform:translateY(0) rotate(-3deg); }
    50%      { transform:translateY(-4px) rotate(3deg); }
  }
  .crown-float { display:inline-block; animation:crownFloat 2s ease-in-out infinite; }

  /* ── Casino banca banner glow ──────────────────────────────────── */
  @keyframes bancaPulse {
    0%,100% { box-shadow: inset 0 0 20px rgba(0,255,170,.04), 0 4px 20px rgba(0,0,0,.5); }
    50%      { box-shadow: inset 0 0 40px rgba(0,255,170,.08), 0 8px 30px rgba(0,255,170,.08); }
  }
  .banca-casino-banner { animation: bancaPulse 3s ease-in-out infinite; }

  /* ── Shimmer on section titles ────────────────────────────────── */
  .section-title {
    background: linear-gradient(90deg, var(--gold) 20%, #fff8c0 45%, var(--gold) 65%, var(--gold2) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmerText 4s linear infinite;
    filter: none !important; /* remove old text-shadow since clip-text doesn't support it */
  }

  /* ── Win/Lose flash more dramatic ────────────────────────────── */
  #win-flash.active {
    background: radial-gradient(ellipse at center, rgba(0,255,170,.22) 0%, rgba(0,200,130,.08) 40%, transparent 70%) !important;
    animation: flashOut .9s ease forwards !important;
  }
  #lose-flash.active {
    background: radial-gradient(ellipse at center, rgba(255,20,50,.22) 0%, rgba(200,0,0,.08) 40%, transparent 70%) !important;
    animation: loseFlashSeq .7s ease forwards !important;
  }
  @keyframes loseFlashSeq {
    0%   { opacity:0; }
    15%  { opacity:1; }
    35%  { opacity:.4; }
    50%  { opacity:.9; }
    100% { opacity:0; }
  }

  /* ── Scrollable page wrapper animation ────────────────────────── */
  #mainContent > * { animation: pageEnter .3s cubic-bezier(.2,.8,.4,1) both; }

  /* ── Glow badges ─────────────────────────────────────────────── */
  .badge-win { animation:floatBadge 2s ease-in-out infinite, winBadgeGlow 2s ease-in-out infinite; }
  @keyframes winBadgeGlow {
    0%,100% { box-shadow: none; }
    50%     { box-shadow: 0 0 8px rgba(0,255,170,.4); }
  }


  /* ── Scroll hint under grids ─────────────────────────────────── */
  @media(max-width:600px) {
    .grid-3, .grid-4 {
      /* gradient mask at right edge to hint scrollability */
      -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
      mask-image: linear-gradient(to right, black 85%, transparent 100%);
    }
    .grid-3:has(:last-child:not(:nth-child(n+4))),
    .grid-4:has(:last-child:not(:nth-child(n+3))) {
      -webkit-mask-image: none;
      mask-image: none;
    }
    /* scroll hint label */
    .scroll-hint {
      display:block;
      font-size:10px; color:rgba(255,215,0,.4); letter-spacing:2px;
      text-align:center; margin-top:6px; margin-bottom:4px;
    }
  }
  @media(min-width:601px) {
    .scroll-hint { display:none; }
  }

  /* ─── MERCADOS ─── */
  .ticker-tape {
    background: rgba(0,0,0,.6);
    border-top: 1px solid rgba(255,215,0,.1);
    border-bottom: 1px solid rgba(255,215,0,.1);
    overflow: hidden; height: 34px; display: flex; align-items: center;
    position: relative; margin-bottom: 24px;
  }
  .ticker-tape::before, .ticker-tape::after {
    content: ''; position: absolute; top: 0; bottom: 0; width: 60px;
    z-index: 2; pointer-events: none;
  }
  .ticker-tape::before { left: 0; background: linear-gradient(to right, var(--dark), transparent); }
  .ticker-tape::after { right: 0; background: linear-gradient(to left, var(--dark), transparent); }
  .ticker-inner {
    display: flex; gap: 40px; white-space: nowrap;
    animation: tickerScroll 60s linear infinite;
    font-family: 'Barlow Condensed', monospace; font-size: 13px; font-weight: 600; letter-spacing: 1px;
  }
  @keyframes tickerScroll { from { transform: translateX(0) } to { transform: translateX(-50%) } }
  .ticker-item { display: flex; align-items: center; gap: 8px; }
  .ticker-sym { color: rgba(255,255,255,.5); font-size: 11px; letter-spacing: 2px; }
  .ticker-price { color: var(--text); }
  .ticker-chg.up { color: var(--green); }
  .ticker-chg.down { color: var(--red); }

  .mkt-categories { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .mkt-cat-btn {
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
    color: var(--muted); padding: 8px 18px; border-radius: 20px;
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; transition: all .2s; text-transform: uppercase;
  }
  .mkt-cat-btn:hover { border-color: rgba(255,215,0,.3); color: rgba(255,215,0,.7); }
  .mkt-cat-btn.active { background: rgba(255,215,0,.1); border-color: var(--gold); color: var(--gold); box-shadow: var(--neon-gold); }
  .mkt-cat-btn.active.green { background: rgba(0,255,170,.08); border-color: var(--green); color: var(--green); box-shadow: var(--neon-green); }
  .mkt-cat-btn.active.blue { background: rgba(68,136,255,.08); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 8px rgba(68,136,255,.4); }

  .mkt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  @media(max-width: 600px) { .mkt-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }

  .asset-card {
    background: linear-gradient(160deg, rgba(16,16,32,.95) 0%, rgba(10,10,22,.98) 100%);
    border: 1px solid rgba(255,255,255,.06); border-radius: 14px;
    padding: 16px; position: relative; overflow: hidden;
    transition: all .25s cubic-bezier(.34,1.3,.64,1);
    animation: cardReveal .4s cubic-bezier(.34,1.2,.64,1) both;
    cursor: default;
  }
  .asset-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,.14); box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  .asset-card.up { border-color: rgba(0,255,170,.15); }
  .asset-card.up:hover { border-color: rgba(0,255,170,.35); box-shadow: 0 8px 30px rgba(0,255,170,.08); }
  .asset-card.down { border-color: rgba(255,34,68,.1); }
  .asset-card.down:hover { border-color: rgba(255,34,68,.3); box-shadow: 0 8px 30px rgba(255,34,68,.07); }

  .asset-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,.1), transparent);
  }
  .asset-card.up::before { background: linear-gradient(90deg, transparent, rgba(0,255,170,.2), transparent); }
  .asset-card.down::before { background: linear-gradient(90deg, transparent, rgba(255,34,68,.15), transparent); }

  .asset-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .asset-icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: rgba(255,255,255,.05); flex-shrink: 0; }
  .asset-sym { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--text); }
  .asset-name { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

  .asset-price { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text); line-height: 1; margin-bottom: 6px; }
  .asset-change { font-size: 13px; font-weight: 700; letter-spacing: .5px; display: flex; align-items: center; gap: 4px; }
  .asset-change.up { color: var(--green); }
  .asset-change.down { color: var(--red); }

  .sparkline-wrap { margin-top: 12px; height: 40px; }
  .sparkline-wrap canvas { width: 100%; height: 40px; }

  .mkt-loading { text-align: center; padding: 60px; color: var(--muted); letter-spacing: 3px; font-size: 13px; }
  .mkt-loading .spin { display: inline-block; animation: spin 1s linear infinite; font-size: 24px; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg) } }

  .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: var(--neon-green); animation: livePulse 2s ease-in-out infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  .mkt-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .mkt-refresh-btn {
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); color: var(--muted);
    padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: 1.5px; transition: all .2s; text-transform: uppercase;
  }
  .mkt-refresh-btn:hover { border-color: rgba(255,215,0,.3); color: var(--gold); }
  .mkt-refresh-btn:disabled { opacity: .4; cursor: not-allowed; }
  .mkt-error { background: rgba(255,34,68,.07); border: 1px solid rgba(255,34,68,.2); border-radius: 10px; padding: 12px 16px; color: var(--red); font-size: 13px; letter-spacing: 1px; margin-bottom: 14px; }
  .mkt-last-update { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 20px; }

  .asset-mcap { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: .5px; }
  .blink { animation: blink .5s step-end 3; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ─── TRADING ─── */
  .trade-modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .trade-modal {
    background: linear-gradient(160deg, rgba(16,16,34,.98) 0%, rgba(10,10,22,.99) 100%);
    border: 1px solid rgba(255,215,0,.2); border-radius: 20px;
    padding: 28px; width: 440px; max-width: 96vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 0 0 1px rgba(255,215,0,.05), 0 40px 80px rgba(0,0,0,.8);
    animation: modalSlide .3s cubic-bezier(.34,1.4,.64,1);
    scrollbar-width: none;
  }
  .trade-modal::-webkit-scrollbar { display: none; }
  @keyframes modalSlide { from{opacity:0;transform:translateY(30px) scale(.94)} to{opacity:1;transform:none} }
  .trade-modal-title {

  .trade-dir-btn.short { background: rgba(255,34,68,.07); border-color: rgba(255,34,68,.2); color: var(--red); }

  .trade-sl-sw { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .trade-input-group { display: flex; flex-direction: column; gap: 6px; }
  .trade-input-label { font-size: 10px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; font-weight: 700; }
  .trade-input {
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1);

  .trade-input.sl:focus { border-color: rgba(255,34,68,.5); box-shadow: var(--neon-red); }
  .trade-input.sw:focus { border-color: rgba(0,255,170,.5); box-shadow: var(--neon-green); }
  .trade-hint { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: .5px; }

  .trade-banca-row {
    background: rgba(0,255,170,.05); border: 1px solid rgba(0,255,170,.12);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;

  }

  .trade-confirm-btn {
    width: 100%; background: linear-gradient(135deg, #ffe566, #FFD700, #ff9800);
    color: #0a0a0e; border: none; padding: 16px; border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px;
    cursor: pointer; transition: all .25s;
    box-shadow: 0 4px 20px rgba(255,215,0,.25);

  .trade-confirm-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 35px rgba(255,215,0,.4); }

  /* Posiciones abiertas */

    background: linear-gradient(135deg, rgba(14,14,28,.9), rgba(10,10,20,.95));

    align-items: center;

  .position-card.long { border-left: 3px solid var(--green); }
  .position-card.short { border-left: 3px solid var(--red); }
  .position-card.closed { opacity: .55; border-left-color: var(--muted); }
  .pos-dir { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; padding: 3px 10px; border-radius: 6px; }
  .pos-dir.long { background: rgba(0,255,170,.1); color: var(--green); }
  .pos-dir.short { background: rgba(255,34,68,.1); color: var(--red); }
  .pos-sym { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; }
  .pos-detail { font-size: 11px; color: var(--muted); letter-spacing: .5px; margin-top: 2px; }
  .pos-pnl { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; text-align: right; }
  .pos-pnl.pos { color: var(--green); text-shadow: var(--neon-green); }
  .pos-pnl.neg { color: var(--red); text-shadow: var(--neon-red); }
  .pos-close-btn {
    background: rgba(255,34,68,.08); border: 1px solid rgba(255,34,68,.2); color: var(--red);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 1.5px; transition: all .2s; white-space: nowrap;
  }
  .pos-close-btn:hover { background: rgba(255,34,68,.18); box-shadow: var(--neon-red); }

  @media(max-width:600px) {

    .trade-sl-sw { grid-template-columns: 1fr; }
    .mkt-header-row { flex-direction: column; align-items: stretch; }

  /* ─── CRASH GAME ─── */
  .crash-arena {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    margin: 12px 0;
    min-height: 260px;
    background:
      linear-gradient(180deg,
        #020814 0%, #040c1e 30%,
        #081428 55%,
        #0a1c10 75%,
        #051008 100%);
    border: 1px solid rgba(0,200,100,.15);
    box-shadow: inset 0 0 60px rgba(0,0,0,.8), 0 0 30px rgba(0,255,100,.04);
  }

  /* Stars */
  .crash-stars {
    position:absolute; inset:0; pointer-events:none;
  }
  .crash-star {
    position:absolute; border-radius:50%;
    background:#fff; animation: starTwinkle linear infinite;
  }
  @keyframes starTwinkle {
    0%,100%{opacity:.2} 50%{opacity:.9}
  }

  /* City skyline SVG overlay */
  .crash-city {
    position:absolute; bottom:0; left:0; right:0; height:90px;
    pointer-events:none; z-index:2;
  }

  /* Ground line */
  .crash-ground {
    position:absolute; bottom:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, transparent, #00ff88, rgba(0,255,136,.3), transparent);
    z-index:3;
    box-shadow: 0 0 12px rgba(0,255,136,.6);
  }

  /* Canvas for curve */
  .crash-canvas-layer {
    position:absolute; inset:0; z-index:4;
    pointer-events:none;
  }

  /* Airplane */
  .crash-plane {
    position:absolute; z-index:8; pointer-events:none;
    font-size:clamp(28px,6vw,44px);
    filter: drop-shadow(0 0 8px rgba(0,255,136,.8)) drop-shadow(0 0 20px rgba(0,255,136,.4));
    transform-origin: center;
    transition: filter .3s;
    will-change: transform;
  }
  .crash-plane.crashed-plane {
    filter: drop-shadow(0 0 10px rgba(255,60,60,.9)) drop-shadow(0 0 30px rgba(255,0,0,.6));
    animation: planeCrashSpin .6s ease-out forwards;
  }
  @keyframes planeCrashSpin {
    0%{transform:rotate(0deg) scale(1)}
    50%{transform:rotate(60deg) scale(1.4)}
    100%{transform:rotate(120deg) scale(0.1);opacity:0}
  }
  .crash-explosion {
    position:absolute; z-index:9; pointer-events:none; display:none;
    font-size:clamp(36px,8vw,60px);
    animation: explodeAnim .8s ease-out forwards;
  }
  @keyframes explodeAnim {
    0%{transform:scale(0.2);opacity:1}
    50%{transform:scale(1.5);opacity:1}
    100%{transform:scale(2.5);opacity:0}
  }

  /* Trail */
  .crash-trail-canvas {
    position:absolute; inset:0; z-index:5; pointer-events:none;
  }

  /* Multiplier overlay */
  .crash-mult-overlay {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:10; text-align:center; pointer-events:none;
  }
  .crash-multiplier {
    font-family:'Bebas Neue',sans-serif;
    font-size: clamp(56px, 13vw, 110px);
    line-height:1; letter-spacing:4px;
    transition: color .2s, text-shadow .2s;
  }
  .crash-multiplier.running {
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,.9), 0 0 60px rgba(0,255,136,.4), 0 0 100px rgba(0,255,136,.2);
    animation: crashPulse .8s ease-in-out infinite;
  }
  .crash-multiplier.crashed {
    color: var(--red);
    text-shadow: 0 0 20px rgba(255,34,68,.9), 0 0 60px rgba(255,34,68,.4);
    animation: crashShake .4s ease;
  }
  .crash-multiplier.waiting {
    color: var(--gold);
    text-shadow: var(--neon-gold);
    animation: crashWaitPulse 2s ease-in-out infinite;
  }
  @keyframes crashPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes crashShake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  @keyframes crashWaitPulse { 0%,100%{opacity:.7} 50%{opacity:1} }

  .crash-mult-label {
    font-size:12px; letter-spacing:4px; color:rgba(255,255,255,.4); margin-top:4px;
    font-family:'Barlow Condensed',sans-serif; text-transform:uppercase;
  }
  .crash-cashed-badge {
    background: rgba(0,255,136,.15); border:1px solid rgba(0,255,136,.4);
    border-radius:20px; padding:5px 16px; font-size:13px; color:var(--green);
    margin-top:6px; letter-spacing:2px; font-weight:700; display:inline-block;
    animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
  }
  .crash-crashed-badge {
    background: rgba(255,34,68,.12); border:1px solid rgba(255,34,68,.4);
    border-radius:20px; padding:5px 16px; font-size:13px; color:var(--red);
    margin-top:6px; letter-spacing:2px; font-weight:700; display:inline-block;
    animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
  }

  /* Controls */
  .crash-controls { padding:16px 0 4px; }
  .crash-cashout-btn {
    width:100%; padding:18px; border-radius:14px; border:none; cursor:pointer;
    font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:4px;
    background: linear-gradient(135deg, #00ff88, #00cc55); color:#000;
    box-shadow: 0 4px 24px rgba(0,255,136,.5), inset 0 1px 0 rgba(255,255,255,.3);
    transition: all .15s;
    position:relative; overflow:hidden;
  }
  .crash-cashout-btn::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.2) 50%, transparent 100%);
    animation: btnShine 1.5s ease infinite;
  }
  .crash-cashout-btn:hover { transform:translateY(-3px) scale(1.01); box-shadow:0 12px 40px rgba(0,255,136,.65); }
  .crash-cashout-btn:active { transform:scale(.98); }
  .crash-cashout-btn:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; animation:none; }
  .crash-history-item { display:inline-block; padding:4px 12px; border-radius:20px; font-family:'Bebas Neue',sans-serif; font-size:14px; margin:3px; cursor:default; transition:transform .15s; }
  .crash-history-item:hover { transform:scale(1.1); }
  .crash-history-item.win { background:rgba(0,255,136,.12); color:var(--green); border:1px solid rgba(0,255,136,.3); }
  .crash-history-item.lose { background:rgba(255,34,68,.10); color:var(--red); border:1px solid rgba(255,34,68,.25); }
  .crash-history-item.epic { background:rgba(255,215,0,.15); color:var(--gold); border:1px solid rgba(255,215,0,.4); box-shadow:var(--neon-gold); }

  /* CRASH WRAPPER responsive */
  @media(max-width:600px) {
    .crash-arena { min-height:200px; }
    .crash-city { height:60px; }
  }

  /* ─── MINAS ─── */
  .mines-grid { display:grid; gap:6px; margin:14px 0; }
  .mine-cell {
    aspect-ratio:1; border-radius:10px; border:none; cursor:pointer;
    background:linear-gradient(145deg,rgba(30,30,60,.9),rgba(20,20,40,.95));
    border:1px solid rgba(255,255,255,.08); font-size:24px;
    display:flex; align-items:center; justify-content:center;
    transition:all .15s cubic-bezier(.34,1.4,.64,1);
  }
  .mine-cell:hover:not(:disabled) { border-color:rgba(255,215,0,.4); transform:scale(1.08); box-shadow:var(--neon-gold); }
  .mine-cell.revealed-safe { background:linear-gradient(145deg,rgba(0,255,136,.15),rgba(0,200,100,.08)); border-color:rgba(0,255,136,.4); }
  .mine-cell.revealed-mine { background:linear-gradient(145deg,rgba(255,34,68,.25),rgba(200,0,0,.15)); border-color:rgba(255,34,68,.5); animation:shake .4s ease; }
  .mine-cell:disabled { cursor:default; }
  .mines-multiplier { font-family:'Bebas Neue',sans-serif; font-size:52px; color:var(--green); text-align:center; text-shadow:var(--neon-green); line-height:1; }

  /* ─── BACCARAT ─── */
  .bacc-card { width:50px; height:74px; background:linear-gradient(145deg,#fff,#eee); border:2px solid #ccc; border-radius:10px; display:inline-flex; flex-direction:column; align-items:center; justify-content:center; font-size:16px; font-weight:900; box-shadow:0 4px 16px rgba(0,0,0,.5); margin:3px; }
  .bacc-card.red { color:#c0392b; }
  .bacc-zone { background:rgba(0,0,0,.25); border-radius:12px; padding:14px; text-align:center; min-height:100px; }
  .bacc-zone-label { font-size:11px;color:var(--muted);letter-spacing:3px;font-weight:700;margin-bottom:8px;text-transform:uppercase; }
  .bacc-zone-score { font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1; }
  .bacc-bet-btns { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:14px 0; }
  .bacc-bet-btn { padding:14px 8px; border-radius:12px; border:2px solid transparent; font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px; cursor:pointer; transition:all .2s; text-align:center; }
  .bacc-bet-btn.player { background:rgba(68,136,255,.1); border-color:rgba(68,136,255,.3); color:var(--blue); }
  .bacc-bet-btn.player.active { background:rgba(68,136,255,.25); border-color:var(--blue); box-shadow:0 0 12px rgba(68,136,255,.4); }
  .bacc-bet-btn.banker { background:rgba(255,34,68,.1); border-color:rgba(255,34,68,.3); color:var(--red); }
  .bacc-bet-btn.banker.active { background:rgba(255,34,68,.25); border-color:var(--red); box-shadow:var(--neon-red); }
  .bacc-bet-btn.tie { background:rgba(255,215,0,.1); border-color:rgba(255,215,0,.3); color:var(--gold); }
  .bacc-bet-btn.tie.active { background:rgba(255,215,0,.2); border-color:var(--gold); box-shadow:var(--neon-gold); }

  /* ─── PLAYING CARDS (War, HiLo, VideoPoker) ─── */
  .playing-card {
    width:56px; height:80px; background:linear-gradient(160deg,#fff 0%,#f0f0f0 100%);
    border:2px solid #ddd; border-radius:10px;
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    padding:4px; font-weight:900; font-size:14px; color:#1a1a2e;
    box-shadow:0 4px 16px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.8);
    position:relative; user-select:none; cursor:default; flex-shrink:0;
    transition:transform .15s,box-shadow .15s;
  }
  .playing-card.red { color:#c0392b; }
  .playing-card.back { background:linear-gradient(135deg,#1a1a6e,#2244cc);color:#fff;font-size:28px;align-items:center;justify-content:center; }
  .playing-card.vp-held { transform:translateY(-8px); box-shadow:0 8px 24px rgba(255,215,0,.5),inset 0 1px 0 rgba(255,255,255,.8); }
  .card-corner { font-size:11px; line-height:1.1; font-weight:900; align-self:flex-start; }

  .card-center { font-size:20px; line-height:1; }

  /* ─── KENO board ─── */
  .keno-board { display:grid; grid-template-columns:repeat(10,1fr); gap:4px; }

  /* ─── WHEEL ─── */
  #wheel-canvas { cursor:default; }

  /* ─── RACE TRACKS ─── */
  .race-track { position:relative; height:32px; background:rgba(0,30,0,.5); border-radius:8px; border:1px solid rgba(255,255,255,.06); overflow:hidden; margin-bottom:6px; }

  /* ─── FORM SELECT ─── */
  .form-select {
    width:100%; background:var(--dark3); border:1px solid rgba(255,255,255,.1);
    color:var(--text); padding:12px 14px; border-radius:10px;

    appearance:none; cursor:pointer;
  }
  .form-select:focus { outline:none; border-color:rgba(255,215,0,.4); }

  /* ─── CRASH SHAKE ─── */
  @keyframes crashShake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }

  /* ─── TORNEOS ─── */
  .torneo-card { background:linear-gradient(145deg,rgba(20,20,40,.9),rgba(14,14,28,.95)); border:1px solid rgba(255,215,0,.15); border-radius:16px; padding:20px; margin-bottom:14px; transition:all .25s; }
  .torneo-card:hover { border-color:rgba(255,215,0,.3); }

  .torneo-player-score { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--gold); }

  .chart-modal-overlay {

    background: rgba(0,0,0,.85); backdrop-filter: blur(8px);

  }
  .chart-modal {

  .chart-modal-price {

  .chart-timeframes {

  .chart-tf-btn {
    padding: 5px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,.08);

    font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s;
    letter-spacing: 1px;
  }
  .chart-tf-btn:hover { border-color: rgba(255,215,0,.3); color: var(--text); }
  .chart-tf-btn.active { background: rgba(255,215,0,.1); border-color: rgba(255,215,0,.4); color: var(--gold); }
  .chart-canvas-wrap {
    flex: 1; padding: 8px 16px 12px; position: relative; min-height: 280px;
  }
  .chart-canvas-wrap canvas { display: block; width: 100%; height: 100%; }

const SUPA_HEADERS = {
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

async function supaFetch(path, options = {}) {
  const res = await fetch(SUPA_URL + path, {
    ...options,
    headers: { ...SUPA_HEADERS, ...(options.headers || {}) }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Supabase error ' + res.status + ': ' + err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const DB = {
  // Obtener todos los registros de una tabla (orden por id)
  async getAll(table) {
    const data = await supaFetch(`/rest/v1/${table}?order=id.asc&limit=10000`);
    return data || [];
  },

  // Insertar un registro y devolver la fila con id asignado
  async insert(table, row) {
    const data = await supaFetch(`/rest/v1/${table}`, {
      method: 'POST',
      body: JSON.stringify(row)
    });
    // Supabase devuelve array cuando Prefer: return=representation
    return Array.isArray(data) ? data[0] : data;
  },

  // Actualizar campos de un registro por id
  async update(table, id, fields) {
    await supaFetch(`/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify(fields)
    });
  },

  // Eliminar un registro por id
  async delete(table, id) {
    await supaFetch(`/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE'
    });
  },

  // Leer un valor de config (tabla "config" con columnas clave/valor)
  async getConfig(clave) {
    try {
      const data = await supaFetch(`/rest/v1/config?clave=eq.${encodeURIComponent(clave)}&limit=1`);
      return (data && data.length > 0) ? data[0].valor : null;
    } catch(e) { return null; }
  },

  // Guardar/actualizar un valor de config (upsert por clave)
  async setConfig(clave, valor) {
    await supaFetch(`/rest/v1/config`, {
      method: 'POST',
      headers: { 'Prefer': 'return=representation,resolution=merge-duplicates' },
      body: JSON.stringify({ clave, valor: String(valor) })
    });

  // Cache local para inmunidades (datos no críticos, se quedan en localStorage)
  _get(key) {
